<!-- ===== loading lore ===== -->

<div id="loading-lore"></div>

<script>

/* =========================
fetch timeout
========================= */

async function fetchWithTimeout(
  url,
  options = {},
  timeout = 12000
) {

  const controller =
    new AbortController();

  const id = setTimeout(
    () => controller.abort(),
    timeout
  );

  try {

    return await fetch(url, {
      ...options,
      signal: controller.signal
    });

  } finally {

    clearTimeout(id);
  }
}

/* =========================
Map Tile 高級化
========================= */

map.eachLayer(layer => {
  if (layer instanceof L.TileLayer) {
    map.removeLayer(layer);
  }
});

L.tileLayer(
  'https://tiles.stadiamaps.com/tiles/alidade_smooth_dark/{z}/{x}/{y}{r}.png',
  {
    attribution:'© Stadia © OSM',
    maxZoom:20
  }
).addTo(map);

/* =========================
loading lore
========================= */

const LORE = [
  '気配を辿っています...',
  '土地の記憶を掘り起こしています...',
  '失われた地点を照合中...',
  '幽かな痕跡を検出...',
  '古い道筋を探索しています...',
  '誰かの記憶を受信しています...',
  '境界の歪みを解析中...',
  '名も無き地点を探索中...'
];

function showLore() {

  const el =
    document.getElementById('loading-lore');

  el.textContent =
    LORE[
      Math.floor(Math.random() * LORE.length)
    ];

  el.classList.add('show');
}

function hideLore() {

  document
    .getElementById('loading-lore')
    .classList.remove('show');
}

/* =========================
route layer
========================= */

let routeLayer = null;

/* =========================
clearRoute
========================= */

function clearRoute() {

  if (!routeLayer) return;

  map.removeLayer(routeLayer);

  routeLayer = null;
}

/* =========================
drawRoute 軽量版
========================= */

async function drawRoute(
  fLat,
  fLon,
  tLat,
  tLon
) {

  const url =
    `${OSRM}/${OSRM_PROFILE[mode]}/${fLon},${fLat};${tLon},${tLat}?overview=full&geometries=geojson`;

  const res =
    await fetchWithTimeout(url);

  const data =
    await res.json();

  if (!data.routes?.length) {
    throw new Error('route');
  }

  clearRoute();

  routeLayer = L.geoJSON(
    data.routes[0].geometry,
    {
      style: {
        color:'#d4af6a',
        weight:4,
        opacity:.88,
        lineCap:'round',
        dashArray:'2, 12'
      }
    }
  ).addTo(map);

  map.fitBounds(
    routeLayer.getBounds(),
    {
      padding:[80,80]
    }
  );
}

/* =========================
marker SVG化
========================= */

const destIcon = L.divIcon({

  className:'',

  iconSize:[80,80],

  iconAnchor:[40,40],

  html:`
  <svg width="80" height="80" viewBox="0 0 80 80">

    <circle
      cx="40"

    />

    <circle

/* =========================
smart pan
========================= */

let lastPan = 0;

function smartPan(lat, lon) {

  const now = Date.now();

  if (now - lastPan < 3000) {
    return;
  }

  lastPan = now;

  map.panTo(
    [lat, lon],
    {
      animate:true,
      duration:1.5
    }
  );
}

/* =========================
weighted pick 改善
========================= */

function weightedPick(spots) {

  const idealDist = {
    foot:1200,
    bike:5000,
    car:15000
  }[mode];

  const weights = spots.map(s => {

    const d = s.distance;

    let w = Math.exp(
      -Math.pow(d - idealDist, 2) /
      (2 * Math.pow(idealDist * 0.7, 2))
    );

    if (isHorror(s)) {
      w *= 2.5;
    }

    if (isEmotional(s)) {
      w *= 2;
    }

    if (!s.tags?.name) {
      w *= 1.2;
    }

    return w;
  });

  const total =
    weights.reduce((a,b)=>a+b,0);

  let r =
    Math.random() * total;

  for (let i=0;i<spots.length;i++) {

    r -= weights[i];

    if (r <= 0) {
      return spots[i];
    }
  }

  return spots[0];
}

/* =========================
到着判定改善
========================= */

function updateDistBadge(lat, lon) {

  if (!spotLat) return;

  const d =
    haversine(
      lat,
      lon,
      spotLat,
      spotLon
    );

  document
    .getElementById('dist-badge')
    .classList.add('show');

  document
    .getElementById('dist-num')
    .textContent = fmtDist(d);

  const arriveDistance = {
    foot:70,
    bike:120,
    car:250
  }[mode];

  if (
    d < arriveDistance &&
    !arrived
  ) {

    arrived = true;

    showReveal();
  }
}

/* =========================
watchPosition
========================= */

function startWatchPosition() {

  if (watchId) {

    navigator.geolocation
      .clearWatch(watchId);
  }

  watchId =
    navigator.geolocation.watchPosition(

      p => {

        const lat =
          p.coords.latitude;

        const lon =
          p.coords.longitude;

        updateSelf(lat, lon);

        smartPan(lat, lon);
      },

      null,

      {
        enableHighAccuracy:
          mode === 'foot',

        maximumAge:5000,

        timeout:10000
      }
    );
}

/* =========================
fetchOSM 軽量化
========================= */

async function fetchOSM(
  lat,
  lon,
  r
) {

  const q = `
[out:json][timeout:45];

(
  nwr["historic"](around:${r},${lat},${lon});

  nwr["historic"="wayside_shrine"](around:${r},${lat},${lon});

  nwr["man_made"~"cross|stele|survey_point"](around:${r},${lat},${lon});

  nwr["tourism"~"artwork|viewpoint"](around:${r},${lat},${lon});

  nwr["natural"~"rock|stone|cave_entrance|cliff|spring|peak|arch"](around:${r},${lat},${lon});

  nwr["waterway"="waterfall"](around:${r},${lat},${lon});

  nwr["man_made"~"lighthouse|mine_shaft|adit|windmill|watermill"](around:${r},${lat},${lon});

  nwr["railway"="abandoned"](around:${r},${lat},${lon});

  nwr["abandoned"](around:${r},${lat},${lon});

  nwr["ruins"](around:${r},${lat},${lon});

  nwr["landuse"="cemetery"](around:${r},${lat},${lon});

  nwr["place"~"locality|hamlet"](around:${r},${lat},${lon});
);

out center;
`;

  for (const server of OVERPASS_SERVERS) {

    try {

      const res =
        await fetchWithTimeout(
          server,
          {
            method:'POST',
            body:'data=' + encodeURIComponent(q)
          },
          15000
        );

      if (!res.ok) {
        continue;
      }

      const data =
        await res.json();

      return (data.elements || [])

        .map(e => ({

          lat:
            e.lat ??
            e.center?.lat,

          lon:
            e.lon ??
            e.center?.lon,

          tags:
            e.tags || {},

          source:'osm',

          id:'osm-' + e.id
        }))

        .filter(e =>
          e.lat &&
          e.lon
        )

        .filter(e =>
          !isExcluded(e)
        );

    } catch(e) {}
  }

  return [];
}

/* =========================
重複除去
========================= */

async function fetchAllSpots(lat, lon) {

  const r = getRadius();

  const [osm, wd] =
    await Promise.all([
      fetchOSM(lat, lon, r),
      fetchWikidata(lat, lon, r)
    ]);

  let all = [...osm, ...wd];

  all = all

    .map(s => ({
      ...s,
      distance:
        haversine(
          lat,
          lon,
          s.lat,
          s.lon
        )
    }))

    .filter(s =>
      s.distance > 50
    )

    .filter(s =>
      !badReports.includes(s.id)
    )

    .filter(s =>
      !recentPicks.includes(s.id)
    );

  const seen = new Set();

  all = all.filter(s => {

    const key =
      Math.round(s.lat * 10000)
      + ':'
      + Math.round(s.lon * 10000);

    if (seen.has(key)) {
      return false;
    }

    seen.add(key);

    return true;
  });

  if (horror) {

    all =
      all.filter(isHorror);

  } else if (emotion) {

    all =
      all.filter(isEmotional);
  }

  return all;
}

/* =========================
go patch
========================= */

const originalGo = go;

go = async function() {

  showLore();

  try {

    await originalGo();

  } finally {

    hideLore();
  }

  if (spotLat && spotLon) {

    map.flyTo(
      [spotLat, spotLon],
      16,
      {
        duration:4
      }
    );

    setTimeout(() => {

      if (destMarker) {

        destMarker.setOpacity(0);

        let opacity = 0;

        const fade = setInterval(() => {

          opacity += 0.08;

          destMarker.setOpacity(opacity);

          if (opacity >= 1) {
            clearInterval(fade);
          }

        }, 30);
      }

    }, 1200);
  }

  startWatchPosition();
};
