<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  -webkit-tap-highlight-color:transparent;
}

/* ===== 基本 ===== */

html,
body{
  height:100%;
  overflow:hidden;
  background:#0a0710;
  color:#e8d9b8;
  font-family:'Shippori Mincho', serif;
}

/* ===== MAP ===== */

#map{
  position:absolute;
  inset:0;
  filter:
    brightness(.75)
    contrast(1.1)
    hue-rotate(-15deg);
  z-index:0;
}

/* 地図暗転 */

#map::after{
  content:'';
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(
      circle at center,
      transparent 45%,
      rgba(0,0,0,.35) 100%
    );
}

/* ===== 全体オーラ ===== */

body::before{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:2;

  background:
    radial-gradient(
      circle at 20% 20%,
      rgba(120,70,180,.12),
      transparent 30%
    ),

    radial-gradient(
      circle at 80% 60%,
      rgba(212,175,106,.08),
      transparent 40%
    ),

    radial-gradient(
      circle at 50% 100%,
      rgba(80,40,120,.15),
      transparent 50%
    );

  mix-blend-mode:screen;

  animation:
    bgFloat 18s ease-in-out infinite alternate;
}

@keyframes bgFloat{

  0%{
    transform:
      translateY(0px)
      scale(1);
  }

  100%{
    transform:
      translateY(-20px)
      scale(1.05);
  }
}

/* ===== 上UI ===== */

#top-overlay{
  position:absolute;
  top:0;
  left:0;
  right:0;

  padding:
    52px
    20px
    24px;

  background:
    linear-gradient(
      to bottom,
      rgba(10,7,16,.92) 50%,
      transparent
    );

  z-index:100;
  pointer-events:none;
}

/* ===== ブランド ===== */

#brand{
  display:flex;
  align-items:baseline;
  gap:14px;
}

#brand-jp{
  font-size:28px;
  font-weight:800;
  letter-spacing:.3em;

  color:transparent;

  background:
    linear-gradient(
      135deg,
      #d4af6a,
      #8b6f3a 50%,
      #d4af6a
    );

  -webkit-background-clip:text;
  background-clip:text;

  animation:
    goldGlow 4s ease-in-out infinite alternate;
}

@keyframes goldGlow{

  0%{
    text-shadow:
      0 0 10px rgba(212,175,106,.2),
      0 0 30px rgba(212,175,106,.15);
  }

  100%{
    text-shadow:
      0 0 20px rgba(212,175,106,.5),
      0 0 60px rgba(212,175,106,.3);
  }
}

#brand-en{
  font-size:10px;
  color:#5a4a60;
  letter-spacing:.4em;
  font-family:sans-serif;
}

#tagline{
  font-size:11px;
  color:#6a5a70;

  margin-top:8px;

  letter-spacing:.15em;
  font-style:italic;
}

/* ===== モードバー ===== */

#mode-bar{
  position:absolute;
  top:120px;
  left:50%;

  transform:translateX(-50%);

  z-index:100;

  display:flex;
  gap:4px;

  padding:4px;

  border-radius:24px;

  background:rgba(10,7,16,.85);

  border:
    1px solid rgba(139,115,85,.25);

  backdrop-filter:
    blur(24px)
    saturate(140%);

  -webkit-backdrop-filter:
    blur(24px)
    saturate(140%);

  box-shadow:
    0 4px 20px rgba(0,0,0,.5),
    inset 0 1px 0 rgba(212,175,106,.1);
}

/* ===== ボタン ===== */

.mode-btn{
  position:relative;
  overflow:hidden;

  padding:8px 16px;

  border:none;
  border-radius:20px;

  background:transparent;

  color:#5a4a60;

  font-size:15px;

  cursor:pointer;

  transition:all .3s;

  -webkit-appearance:none;
}

.mode-btn::before{
  content:'';

  position:absolute;
  inset:0;

  background:
    linear-gradient(
      120deg,
      transparent,
      rgba(255,255,255,.12),
      transparent
    );

  transform:translateX(-120%);
}

.mode-btn:active::before{
  animation:shine .7s ease;
}

@keyframes shine{
  to{
    transform:translateX(120%);
  }
}

.mode-btn.active{
  transform:
    translateY(-2px)
    scale(1.05);

  background:
    linear-gradient(
      135deg,
      rgba(212,175,106,.2),
      rgba(94,55,120,.2)
    );

  color:#d4af6a;

  box-shadow:
    inset 0 0 8px rgba(212,175,106,.2);
}

/* ===== 距離バッジ ===== */

#dist-badge{
  position:absolute;

  top:50%;
  left:50%;

  transform:
    translate(-50%,-50%);

  z-index:100;

  display:none;

  padding:
    18px
    32px;

  border-radius:24px;

  text-align:center;

  background:
    radial-gradient(
      ellipse at center,
      rgba(10,7,16,.95),
      rgba(20,10,30,.95)
    );

  border:
    1px solid rgba(212,175,106,.3);

  backdrop-filter:
    blur(24px)
    saturate(140%);

  -webkit-backdrop-filter:
    blur(24px)
    saturate(140%);

  box-shadow:
    0 0 30px rgba(94,55,120,.4),
    inset 0 1px 0 rgba(212,175,106,.15);
}

#dist-badge.show{
  display:block;
  animation:
    float 3s ease-in-out infinite;
}

@keyframes float{

  0%,
  100%{
    transform:
      translate(-50%,-50%);
  }

  50%{
    transform:
      translate(-50%,calc(-50% - 6px));
  }
}

#dist-num{
  font-size:38px;
  font-weight:700;

  color:transparent;

  background:
    linear-gradient(
      135deg,
      #f0d49a,
      #d4af6a
    );

  -webkit-background-clip:text;
  background-clip:text;

  text-shadow:
    0 0 20px rgba(212,175,106,.5),
    0 0 40px rgba(212,175,106,.2);

  letter-spacing:-.02em;
  line-height:1;
}

#dist-unit{
  font-size:11px;
  color:#6a5a70;

  margin-top:6px;

  letter-spacing:.2em;
}

/* ===== マーカー ===== */

.q-marker{
  position:relative;

  width:44px;
  height:44px;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:
    50%
    50%
    50%
    0;

  background:
    radial-gradient(
      circle at 30% 30%,
      #d4af6a,
      #8b6f3a
    );

  transform:rotate(-45deg);

  box-shadow:
    0 4px 16px rgba(94,55,120,.6),
    0 0 24px rgba(212,175,106,.4);

  animation:
    markerPulse 2.5s ease-in-out infinite,
    markerFloat 4s ease-in-out infinite;
}

.q-marker::after{
  content:'';

  position:absolute;
  inset:-12px;

  border-radius:50%;

  border:
    1px solid rgba(212,175,106,.25);

  animation:ring 2s linear infinite;
}

.q-marker-inner{
  transform:rotate(45deg);

  font-size:18px;
  font-weight:800;

  color:#0a0710;
}

@keyframes markerPulse{

  0%,
  100%{
    box-shadow:
      0 4px 16px rgba(94,55,120,.6),
      0 0 24px rgba(212,175,106,.4);
  }

  50%{
    box-shadow:
      0 4px 20px rgba(94,55,120,.8),
      0 0 40px rgba(212,175,106,.7);
  }
}

@keyframes markerFloat{

  0%,
  100%{
    transform:
      rotate(-45deg)
      translateY(0px);
  }

  50%{
    transform:
      rotate(-45deg)
      translateY(-8px);
  }
}

@keyframes ring{

  0%{
    transform:scale(.8);
    opacity:.8;
  }

  100%{
    transform:scale(1.6);
    opacity:0;
  }
}

/* ===== iPhoneぬるぬる ===== */

*{
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
</style>
