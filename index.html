<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>幽路 — yuro</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: #050307; color: #e8d9b8; font-family: 'Shippori Mincho', serif; }

/* ===== 空間演出レイヤー ===== */
#map { position: absolute; inset: 0; z-index: 0; background: #09060f; }
.vignette { position: absolute; inset: 0; pointer-events: none; z-index: 2; background: radial-gradient(circle, transparent 30%, rgba(5,3,7,0.85) 100%); }
.ambient-glow { position: absolute; inset: 0; pointer-events: none; z-index: 1; background: radial-gradient(circle at 80% 20%, rgba(94,55,120,0.22), transparent 45%), radial-gradient(circle at 10% 80%, rgba(212,175,106,0.15), transparent 50%); will-change: transform; animation: ambientSwing 25s ease-in-out infinite alternate; }
@keyframes ambientSwing { 0% { transform: scale(1); } 100% { transform: scale(1.12) translate(8px, -8px); } }
.scanlines { position: absolute; inset: 0; pointer-events: none; z-index: 3; background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.35) 50%), linear-gradient(90deg, rgba(255,0,0,0.02), rgba(0,255,0,0.01), rgba(0,0,255,0.02)); background-size: 100% 4px, 6px 100%; opacity: 0.6; }

#particles { position: absolute; inset: 0; z-index: 2; overflow: hidden; pointer-events: none; }
.particle { position: absolute; width: 3px; height: 3px; border-radius: 50%; background: #d4af6a; box-shadow: 0 0 8px #d4af6a; animation: floatUp linear infinite; will-change: transform; }
@keyframes floatUp {
  from { transform: translateY(105vh) scale(0.5); opacity: 0; }
  20% { opacity: 0.6; }
  80% { opacity: 0.6; }
  to { transform: translateY(-5vh) scale(1.2); opacity: 0; }
}

/* ===== 重厚感のあるUIデザイン ===== */
#top-overlay { position: absolute; top: 0; left: 0; right: 0; padding: 48px 24px 28px; background: linear-gradient(to bottom, #050307 40%, rgba(5,3,7,0.7) 75%, transparent); z-index: 100; pointer-events: none; }
#brand-jp { font-size: 28px; font-weight: 800; letter-spacing: 0.35em; color: transparent; background: linear-gradient(135deg, #f3e5c8, #d4af6a 40%, #8b6f3a); -webkit-background-clip: text; background-clip: text; text-shadow: 0 0 15px rgba(212,175,106,0.25); }
#tagline { font-size: 10px; color: #7a6985; margin-top: 6px; letter-spacing: 0.15em; font-style: italic; text-shadow: 1px 1px 2px #000; }

#mode-bar { position: absolute; top: 115px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; gap: 6px; background: rgba(12,9,18,0.85); border: 1px solid rgba(212,175,106,0.35); border-radius: 24px; padding: 5px 8px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); box-shadow: 0 8px 32px rgba(0,0,0,0.7), inset 0 1px 1px rgba(255,255,255,0.05); }
.mode-btn { width: 38px; height: 38px; border-radius: 50%; border: none; background: transparent; color: #5a4a60; font-size: 16px; cursor: pointer; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); display: flex; align-items: center; justify-content: center; }
.mode-btn.active { background: linear-gradient(135deg, rgba(212,175,106,0.2), rgba(94,55,120,0.25)); color: #d4af6a; border: 1px solid rgba(212,175,106,0.4); box-shadow: 0 0 10px rgba(212,175,106,0.2); transform: scale(1.08); }

#dist-badge { position: absolute; top: 38%; left: 50%; transform: translate(-50%, -50%); z-index: 100; display: none; background: radial-gradient(circle, #120d1a 0%, #050307 100%); border: 1px solid rgba(212,175,106,0.45); border-radius: 20px; padding: 16px 36px; text-align: center; pointer-events: none; box-shadow: 0 12px 40px rgba(0,0,0,0.7), inset 0 0 15px rgba(94,55,120,0.3); }
#dist-badge.show { display: block; animation: badgeFloat 4s ease-in-out infinite; }
@keyframes badgeFloat { 0%, 100% { transform: translate(-50%, -50%); } 50% { transform: translate(-50%, -56%); } }
#dist-num { font-size: 34px; font-weight: 800; color: transparent; background: linear-gradient(135deg, #fff, #d4af6a); -webkit-background-clip: text; background-clip: text; letter-spacing: -0.02em; text-shadow: 0 0 12px rgba(212,175,106,0.4); }
#dist-unit { font-size: 9px; color: #6a5a70; margin-top: 4px; letter-spacing: 0.25em; text-transform: uppercase; }

#debug-panel { display: none; position: absolute; top: 175px; left: 50%; transform: translateX(-50%); z-index: 100; background: rgba(5,3,7,0.85); border: 1px solid rgba(212,175,106,0.35); border-radius: 12px; padding: 10px 16px; font-size: 11px; text-align: center; width: 88%; max-width: 320px; color: #d4af6a; backdrop-filter: blur(8px); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }

#bottom { position: absolute; bottom: 0; left: 0; right: 0; z-index: 100; padding: 24px 20px 44px; background: linear-gradient(to top, #050307 75%, transparent); }
#go-btn { width: 100%; padding: 18px 0; border-radius: 16px; border: 1px solid rgba(212,175,106,0.5); background: linear-gradient(135deg, rgba(25,18,35,0.9), rgba(15,10,22,0.9)); color: #f0d49a; font-size: 15px; font-weight: 700; font-family: inherit; letter-spacing: 0.3em; cursor: pointer; box-shadow: 0 6px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05); transition: all 0.3s; -webkit-appearance: none; }
#go-btn:active { background: rgba(212,175,106,0.15); transform: translateY(1px); }
#go-btn:disabled { opacity: 0.4; cursor: not-allowed; }
#error-msg { display: none; font-size: 11px; color: #c89090; margin-bottom: 12px; padding: 10px; background: rgba(40,10,20,0.6); border: 1px solid rgba(180,80,80,0.4); border-radius: 8px; text-align: center; }

/* ===== REVEAL MODAL ===== */
#reveal-modal { display: none; position: absolute; inset: 0; z-index: 300; background: radial-gradient(circle at center, #11091c 0%, #040206 100%); flex-direction: column; align-items: center; justify-content: center; padding: 28px; text-align: center; opacity: 0; transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
#reveal-modal.show { display: flex; opacity: 1; }
#reveal-icon { font-size: 64px; margin-bottom: 16px; filter: drop-shadow(0 0 20px rgba(212,175,106,0.5)); animation: floatGlow 3s ease-in-out infinite; }
@keyframes floatGlow { 0%, 100% { transform: translateY(0); filter: drop-shadow(0 0 15px rgba(212,175,106,0.4)); } 50% { transform: translateY(-6px); filter: drop-shadow(0 0 25px rgba(94,55,120,0.7)); } }
#reveal-name { font-size: 24px; font-weight: 800; color: transparent; background: linear-gradient(135deg, #fff, #f6e3be 40%, #d4af6a); -webkit-background-clip: text; background-clip: text; margin-bottom: 8px; letter-spacing: 0.08em; line-height: 1.4; text-shadow: 0 0 20px rgba(255,255,255,0.1); }
#reveal-cat { font-size: 10px; color: #d4af6a; margin-bottom: 24px; letter-spacing: 0.25em; border: 1px solid rgba(212,175,106,0.4); padding: 3px 16px; border-radius: 20px; background: rgba(12,9,18,0.6); box-shadow: inset 0 0 8px rgba(94,55,120,0.4); }
#reveal-desc { font-size: 13px; color: #c4b5cb; line-height: 1.9; margin-bottom: 36px; max-width: 300px; text-align: left; text-indent: 1em; padding: 16px; background: rgba(5,3,7,0.4); border-radius: 12px; border: 1px solid rgba(212,175,106,0.15); box-shadow: inset 0 0 20px rgba(0,0,0,0.6); }
#reveal-actions { display: flex; gap: 12px; width: 100%; max-width: 300px; }
.reveal-btn { flex: 1; padding: 14px 0; border-radius: 12px; border: 1px solid rgba(212,175,106,0.3); background: rgba(12,9,18,0.7); color: #8d7b94; font-size: 13px; font-family: inherit; font-weight: 600; letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s; -webkit-appearance: none; }
.reveal-btn.primary { background: linear-gradient(135deg, rgba(212,175,106,0.25), rgba(94,55,120,0.25)); color: #f0d49a; border-color: #d4af6a; box-shadow: 0 4px 15px rgba(212,175,106,0.2); }

/* ===== マップピン ===== */
.q-marker { width: 34px; height: 34px; background: radial-gradient(circle at 35% 35%, #ecdbb5, #8b6f3a); border-radius: 50% 50% 50% 0; transform: rotate(-45deg); display: flex; align-items: center; justify-content: center; position: relative; }
.q-marker::before { content: ""; position: absolute; inset: -8px; border-radius: 50%; border: 1px solid rgba(212,175,106,0.5); animation: pinPulse 2s cubic-bezier(0.215, 0.610, 0.355, 1) infinite; pointer-events: none; }
@keyframes pinPulse { from { transform: scale(0.6); opacity: 1; } to { transform: scale(1.6); opacity: 0; } }
.q-marker-inner { transform: rotate(45deg); font-size: 14px; font-weight: 800; color: #050307; }

.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(212,175,106,0.2); border-top-color: #d4af6a; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: -2px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="map"></div>
<div class="ambient-glow"></div>
<div id="particles"></div>
<div class="vignette"></div>
<div class="scanlines"></div>

<div id="top-overlay">
  <div id="brand-jp">幽路</div>
  <div id="tagline">— 行き先は、辿り着いた者のみ知る —</div>
</div>

<div id="mode-bar">
  <button class="mode-btn active" data-mode="foot" title="徒歩">🚶</button>
  <button class="mode-btn" data-mode="bike" title="自転車">🚴</button>
  <button class="mode-btn" data-mode="car" title="車">🚗</button>
  <div style="width:1px; background:rgba(212,175,106,0.2); margin:6px 2px;"></div>
  <button class="mode-btn" id="emotion-btn" title="詩情">✨</button>
  <button class="mode-btn" id="horror-btn" title="怪異">👻</button>
</div>

<div id="dist-badge">
  <div id="dist-num">—</div>
  <div id="dist-unit">Distance</div>
</div>

<div id="debug-panel">
  <div id="debug-name" style="font-weight:700; font-size:13px; margin-bottom:2px;"></div>
  <div id="debug-meta" style="font-size:10px; opacity:0.6; margin-bottom:8px;"></div>
  <a id="debug-gmap" href="#" target="_blank" rel="noopener" style="color:#d4af6a; text-decoration:none; font-size:11px; border-bottom: 1px dotted #d4af6a;">[ 現世の地図で確認 ↗ ]</a>
</div>

<div id="bottom">
  <div id="error-msg"></div>
  <button id="go-btn">どこか連れてって</button>
</div>

<div id="reveal-modal">
  <div id="reveal-icon">📍</div>
  <div id="reveal-label" style="font-size:9px; color:#8b7355; letter-spacing:0.5em; margin-bottom:4px;">REVEALED</div>
  <div id="reveal-name">謎の場所</div>
  <div id="reveal-cat">不明</div>
  <div id="reveal-desc"></div>
  <div id="reveal-actions">
    <button class="reveal-btn" id="reveal-bad">此処を除外</button>
    <button class="reveal-btn primary" id="reveal-again">再び旅立つ</button>
  </div>
</div>

<script>
const OSRM = 'https://router.project-osrm.org/route/v1';
const OVERPASS_SERVERS = ['https://overpass-api.de/api/interpreter', 'https://overpass.kumi.systems/api/interpreter'];

// ★【超重要】移動手段に紐づく探索半径の最小・最大（メートル）
const DIST_CONFIG = {
  foot: { min: 300, max: 1500 },     // 徒歩：身近な路地裏（徒歩5分〜20分圏内）
  bike: { min: 1500, max: 5000 },    // 自転車：少し遠くの隣町（チャリ10分〜25分圏内）
  car: { min: 5000, max: 15000 }     // 車：完全に非日常の領域（車15分〜30分圏内）
};

const OSRM_PROFILE = { foot: 'foot', bike: 'bike', car: 'driving' };

const HORROR_KEYWORDS = /血|鬼|呪|死|首|怨|霊|怪|妖|幽|地獄|供養|処刑|刑場|無縁|殉難|墓|塚|事故|心霊|骨|闇|魔|隠|仏|寺/;
const EMOTION_KEYWORDS = /民話|伝説|文学|物語|信仰|聖地|遺跡|名木|巨木|奇岩|滝|湧水|名水|古道|旧道|城跡|跡|庵|碑|灯籠|橋|辨財天|弁天/;

const STORIES = {
  horror: [
     "地元の古老さえ口を閉ざす、地図から半分消されたかのような境界。陽が落ちてからここに長居した者は、枕元に立つ「濡れた影」にうなされるという。",
     "かつて大きな戦、あるいは恐ろしい野ざらしの果てに、無数の無縁仏が埋められたと伝わる土壌。耳を澄ますと、風の音に混じって現世を呪うような囁きが聞こえる。",
     "古い記録には『不入の地』と記された、霊脈が激しくねじ曲がった特異点。古くから奇妙な神隠しや、説明のつかない辻斬りが多発したと噂される路地裏。",
     "此処に遺された石造物の裏には、削り取られた古い呪詛の文字が眠る。興味本位で足を踏み入れた者は、帰路で必ず『数が増えている足音』を聴くことになる。"
  ],
  emotion: [
     "数百年もの間、旅人たちを見守り、あるいはその涙を吸い込んできた静謐なる古跡。都会の喧騒のすぐ裏で、ここだけが時の流れから完全に置き去りにされている。",
     "古き時代の詩人や異端の信仰者たちが、人目を忍んで集ったとされる祈りの残滓。空気はどこか冷たくも優しく、今なお目に見えない古い約束が生きている気配がする。",
     "名もなき旅人が行き倒れ、その魂を慰めるために路傍にそっと建てられた小さな標。かつてここを通った数千人の足跡が、目に見えない幾何学模様となって地面に刻まれている。",
     "夜露に濡れた苔の下に、歴史の教科書には決して載らない市井の民のささやかな願いが眠る場所。目を閉じると、遥か昔の誰かの祈りの唄が、胸の奥に静かに響き渡る。"
  ],
  default: [
     "現世の合理的な開発から奇跡的にこぼれ落ちた、時間線の空白地帯。かつてここに何があったのか、それを知る術は失われているが、土地の記憶だけが確かに息づいている。",
     "都市の血管の隙間に潜む、静かなる隠れ里。訪れる者の心の歪みに応じて、この場所は優しくも、時に冷酷な顔を見せるという。辿り着いた事自体が、一つの奇縁である。"
  ]
};

let mode = 'foot', emotion = false, horror = false;
let recentPicks = [], badReports = [];
let userLat, userLon, spotLat, spotLon, chosenSpot = null;
let routeLayer = null, selfMarker = null, destMarker = null, watchId = null;

const map = L.map('map', { zoomControl: false, fadeAnimation: false }).setView([35.6812, 139.7671], 14);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
  subdomains: 'abcd', maxZoom: 18
}).addTo(map);

const selfIcon = L.divIcon({
  html: `<div style="width:14px;height:14px;background:#d4af6a;border:2px solid #fff;border-radius:50%;box-shadow:0 0 12px #d4af6a;"></div>`,
  className: '', iconAnchor: [7, 7]
});
const destIcon = L.divIcon({
  html: '<div class="q-marker"><div class="q-marker-inner">?</div></div>',
  className: '', iconAnchor: [17, 34]
});

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

function getDetails(s) {
  const t = s.tags || {};
  const name = s.name || t.name || t['name:ja'] || '名無き遺構';
  
  let icon = '📍';
  let cat = '隠れた古跡';
  let modeKey = 'default';

  if (HORROR_KEYWORDS.test(name) || t.historic === 'tomb' || t.amenity === 'grave_yard') {
    icon = '👻'; cat = '怪異伝承の地'; modeKey = 'horror';
  } else if (t.historic === 'wayside_shrine' || t.historic === 'wayside_cross') {
    icon = '🪦'; cat = '路傍の石仏・祠'; modeKey = emotion ? 'emotion' : (horror ? 'horror' : 'default');
  } else if (t.historic === 'castle' || t.historic === 'fortress') {
    icon = '🏯'; cat = '古城・砦の残滓'; modeKey = 'emotion';
  } else if (t.natural === 'tree' || t.natural === 'stone') {
    icon = '🌳'; cat = '老木・霊石の境界'; modeKey = 'emotion';
  } else if (t.waterway === 'waterfall' || t.natural === 'spring') {
    icon = '🏞️'; cat = '秘められた名瀑・湧水'; modeKey = 'emotion';
  } else if (t.amenity === 'place_of_worship') {
    icon = '⛩️'; cat = '由緒ある社寺の影'; modeKey = emotion ? 'emotion' : 'default';
  } else if (EMOTION_KEYWORDS.test(name) || t.historic) {
    icon = '✨'; cat = '詩情あふれる古跡'; modeKey = 'emotion';
  }

  if (horror) { icon = '👻'; cat = '境界線上の怪異'; modeKey = 'horror'; }
  else if (emotion) { icon = '✨'; cat = '時の止まった静寂'; modeKey = 'emotion'; }

  const hash = s.id ? s.id.split('-')[1] || 0 : 0;
  const arr = STORIES[modeKey] || STORIES['default'];
  const baseDesc = arr[parseInt(hash) % arr.length];
  
  const subInfo = t.description ? `\n（現世の記録: ${t.description}）` : '';
  return { name, icon, cat, desc: baseDesc + subInfo };
}

function showError(msg) { const e = document.getElementById('error-msg'); e.textContent = msg; e.style.display = 'block'; }
function hideError() { document.getElementById('error-msg').style.display = 'none'; }

function setBtnState(isLoading, text) {
  const b = document.getElementById('go-btn');
  b.disabled = isLoading;
  b.innerHTML = isLoading ? `<span class="spinner"></span>${text}` : text;
}

function checkArrival(lat, lon) {
  if (!spotLat) return;
  const d = haversine(lat, lon, spotLat, spotLon);
  document.getElementById('dist-badge').classList.add('show');
  document.getElementById('dist-num').textContent = d < 1000 ? d + 'm' : (d/1000).toFixed(1) + 'km';
  
  if (d <= 40) {
    if (watchId) navigator.geolocation.clearWatch(watchId);
    const details = getDetails(chosenSpot);
    document.getElementById('reveal-icon').textContent = details.icon;
    document.getElementById('reveal-name').textContent = details.name;
    document.getElementById('reveal-cat').textContent = details.cat;
    document.getElementById('reveal-desc').textContent = details.desc;
    
    const modal = document.getElementById('reveal-modal');
    modal.style.display = 'flex';
    setTimeout(() => modal.classList.add('show'), 10);
    navigator.vibrate?.([100, 50, 100]);
  }
}

function updateLocation(lat, lon) {
  userLat = lat; userLon = lon;
  if (!selfMarker) selfMarker = L.marker([lat, lon], { icon: selfIcon }).addTo(map);
  else selfMarker.setLatLng([lat, lon]);
  checkArrival(lat, lon);
}

// ★【大改修】選択されたモードに応じた「最大半径」でクエリを動的に生成
async function fetchSpots(lat, lon) {
  const cfg = DIST_CONFIG[mode];
  const maxRadius = cfg.max;

  // 車の場合は対象データが爆増するため、軽めのタグ（主要な古跡・社寺）に絞ってタイムアウトを防ぐ
  const filterString = (mode === 'car') 
    ? `node["historic"~"castle|fortress|monument|ruins|tomb"](around:${maxRadius},${lat},${lon});
       node["amenity"="grave_yard"](around:${maxRadius},${lat},${lon});
       node["waterway"="waterfall"](around:${maxRadius},${lat},${lon});`
    : `node["historic"](around:${maxRadius},${lat},${lon});
       node["amenity"~"place_of_worship|grave_yard"](around:${maxRadius},${lat},${lon});
       node["natural"~"rock|stone|cave_entrance|spring|tree"](around:${maxRadius},${lat},${lon});
       node["waterway"="waterfall"](around:${maxRadius},${lat},${lon});
       node["railway"~"abandoned|disused"](around:${maxRadius},${lat},${lon});`;

  const opaq = `[out:json][timeout:25];(${filterString});out center;`;

  for (const server of OVERPASS_SERVERS) {
    try {
      const res = await fetch(server, { method: 'POST', body: 'data=' + encodeURIComponent(opaq) });
      if (!res.ok) continue;
      const data = await res.json();
      return (data.elements || []).map(e => ({
        lat: e.lat || e.center?.lat, lon: e.lon || e.center?.lon,
        tags: e.tags || {}, id: 'osm-' + e.id
      })).filter(e => e.lat && e.lon);
    } catch (err) {}
  }
  return [];
}

async function startJourney() {
  hideError();
  setBtnState(true, '霊脈を探索中...');
  
  try {
    const pos = await new Promise((res, rej) => {
      navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true, timeout: 8000 });
    });
    updateLocation(pos.coords.latitude, pos.coords.longitude);
    map.setView([userLat, userLon], 15);
    
    let list = await fetchSpots(userLat, userLon);
    
    // ★【大改修】直線距離を算出し、各モードの「最小〜最大」のドーナツ範囲内に厳密フィルタリング
    const cfg = DIST_CONFIG[mode];
    list.forEach(s => s.dist = haversine(userLat, userLon, s.lat, s.lon));
    list = list.filter(s => s.dist >= cfg.min && s.dist <= cfg.max);

    // 除外リストと既読リストの適用
    list = list.filter(s => !badReports.includes(s.id) && !recentPicks.includes(s.id));
    
    // 世界観フィルター
    if (horror) {
      list = list.filter(s => HORROR_KEYWORDS.test(s.tags.name || '') || s.tags.amenity === 'grave_yard');
    } else if (emotion) {
      list = list.filter(s => EMOTION_KEYWORDS.test(s.tags.name || '') || s.tags.historic);
    }

    if (!list.length) { 
      showError(`この移動手段（${mode === 'foot' ? '徒歩圏内' : mode === 'bike' ? '自転車圏内' : '車圏内'}）で見つかる「幽路」がありません。条件を変えるか移動してください。`); 
      setBtnState(false, 'どこか連れてって'); 
      return; 
    }

    // 近いものから上位数件を抽選対象にする（遠すぎるものが極端に選ばれないようにソート）
    list.sort((a,b) => a.dist - b.dist);
    chosenSpot = list[Math.floor(Math.random() * Math.min(list.length, 6))];
    
    spotLat = chosenSpot.lat; spotLon = chosenSpot.lon;
    recentPicks.push(chosenSpot.id); if (recentPicks.length > 20) recentPicks.shift();

    if (destMarker) map.removeLayer(destMarker);
    destMarker = L.marker([spotLat, spotLon], { icon: destIcon }).addTo(map);

    if (routeLayer) map.removeLayer(routeLayer);
    const rRes = await fetch(`${OSRM}/${OSRM_PROFILE[mode]}/${userLon},${userLat};${spotLon},${spotLat}?overview=full&geometries=geojson`);
    const rData = await rRes.json();
    if (rData.routes?.length) {
      routeLayer = L.geoJSON(rData.routes[0].geometry, { style: { color: '#d4af6a', weight: 2.5, dashArray: '6,6', opacity: 0.8 } }).addTo(map);
      map.fitBounds(routeLayer.getBounds(), { padding: [60, 60] });
    }

    const det = getDetails(chosenSpot);
    document.getElementById('debug-name').textContent = det.name;
    document.getElementById('debug-meta').textContent = `${det.cat} / 直線距離 ${chosenSpot.dist}m (${mode === 'foot' ? '徒歩' : mode === 'bike' ? '自転車' : '車'})`;
    document.getElementById('debug-gmap').href = `https://maps.google.com/?q=${spotLat},${spotLon}`;
    document.getElementById('debug-panel').style.display = 'block';

    checkArrival(userLat, userLon);
    setBtnState(false, '別の場所へ');

    if (watchId) navigator.geolocation.clearWatch(watchId);
    watchId = navigator.geolocation.watchPosition(p => {
      updateLocation(p.coords.latitude, p.coords.longitude);
    }, null, { enableHighAccuracy: true });

  } catch (err) {
    showError('位置情報または霊脈の境界を特定できませんでした');
    setBtnState(false, 'どこか連れてって');
  }
}

function resetUI() {
  const modal = document.getElementById('reveal-modal');
  modal.classList.remove('show');
  setTimeout(() => modal.style.display = 'none', 500);
  
  if (destMarker) { map.removeLayer(destMarker); destMarker = null; }
  if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
  document.getElementById('dist-badge').classList.remove('show');
  document.getElementById('debug-panel').style.display = 'none';
  setBtnState(false, 'どこか連れてって');
}

document.getElementById('go-btn').addEventListener('click', startJourney);
document.getElementById('reveal-again').addEventListener('click', resetUI);
document.getElementById('reveal-bad').addEventListener('click', () => { if (chosenSpot) badReports.push(chosenSpot.id); resetUI(); });

document.querySelectorAll('.mode-btn[data-mode]').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn[data-mode]').forEach(btn => btn.classList.remove('active'));
    b.classList.add('active'); mode = b.dataset.mode;
  });
});
document.getElementById('emotion-btn').addEventListener('click', () => { emotion = !emotion; if (emotion) horror = false; updateFilters(); });
document.getElementById('horror-btn').addEventListener('click', () => { horror = !horror; if (horror) emotion = false; updateFilters(); });
function updateFilters() {
  document.getElementById('emotion-btn').classList.toggle('active', emotion);
  document.getElementById('horror-btn').classList.toggle('active', horror);
}

window.addEventListener('DOMContentLoaded', () => {
  const container = document.getElementById('particles');
  for (let i = 0; i < 15; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (12 + Math.random() * 10) + 's';
    p.style.animationDelay = (-Math.random() * 20) + 's';
    container.appendChild(p);
  }
});
</script>
</body>
</html>
