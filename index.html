<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>

<title>幽路 — yuro</title>

<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700;800&display=swap" rel="stylesheet">

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,
body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#09070d;
  font-family:'Shippori Mincho',serif;
  color:#e8d9b8;
}

#map{
  position:absolute;
  inset:0;
  z-index:0;

  filter:
    brightness(.72)
    contrast(1.08)
    hue-rotate(-10deg);
}

body::after{
  content:'';

  position:fixed;
  inset:0;

  pointer-events:none;

  background:
    radial-gradient(circle at 20% 30%,rgba(255,255,255,.02),transparent 45%),
    radial-gradient(circle at 80% 70%,rgba(255,255,255,.015),transparent 40%);

  opacity:.45;
}

.leaflet-control-attribution{
  display:none;
}

/* ======================
TOP
====================== */

#top{

  position:absolute;

  top:0;
  left:0;
  right:0;

  z-index:100;

  padding:
    54px 22px
    28px;

  background:
    linear-gradient(
      to bottom,
      rgba(10,7,16,.95),
      transparent
    );
}

#brand{
  display:flex;
  align-items:baseline;
  gap:14px;
}

#brand-jp{

  font-size:30px;
  font-weight:800;

  letter-spacing:.28em;

  color:transparent;

  background:
    linear-gradient(
      135deg,
      #f0d49a,
      #b28a48
    );

  -webkit-background-clip:text;
  background-clip:text;
}

#brand-en{

  font-size:10px;

  color:#77657e;

  letter-spacing:.45em;
}

#tagline{

  margin-top:10px;

  font-size:11px;

  color:#7d6b84;

  letter-spacing:.18em;

  font-style:italic;
}

/* ======================
MODE
====================== */

#mode-bar{

  position:absolute;

  top:122px;
  left:50%;

  transform:translateX(-50%);

  z-index:100;

  display:flex;
  gap:6px;

  padding:6px;

  border-radius:30px;

  background:
    rgba(10,7,16,.88);

  border:
    1px solid
    rgba(212,175,106,.16);

  backdrop-filter:blur(10px);
}

.mode-btn{

  border:none;

  background:transparent;

  color:#6e5c78;

  border-radius:24px;

  padding:
    10px 16px;

  font-size:16px;

  cursor:pointer;
}

.mode-btn.active{

  color:#f0d49a;

  background:
    linear-gradient(
      135deg,
      rgba(212,175,106,.16),
      rgba(94,55,120,.28)
    );
}

/* ======================
DIST
====================== */

#dist{

  position:absolute;

  top:50%;
  left:50%;

  transform:
    translate(-50%,-50%);

  z-index:100;

  display:none;

  min-width:170px;

  padding:
    18px 26px;

  border-radius:26px;

  background:
    rgba(10,7,16,.92);

  border:
    1px solid
    rgba(212,175,106,.22);

  text-align:center;

  backdrop-filter:blur(14px);
}

#dist.show{
  display:block;
}

#dist-num{

  font-size:40px;
  font-weight:700;

  color:#f0d49a;
}

#dist-label{

  margin-top:8px;

  font-size:11px;

  color:#8b7355;

  letter-spacing:.25em;
}

/* ======================
BOTTOM
====================== */

#bottom{

  position:absolute;

  left:0;
  right:0;
  bottom:0;

  z-index:100;

  padding:
    20px
    18px
    40px;

  background:
    linear-gradient(
      to top,
      rgba(10,7,16,.98),
      transparent
    );
}

#error{

  display:none;

  margin-bottom:12px;

  padding:12px;

  border-radius:12px;

  background:
    rgba(80,20,20,.4);

  color:#e0aaaa;

  font-size:12px;
}

#go{

  width:100%;

  border:none;

  border-radius:18px;

  padding:
    18px 0;

  background:
    linear-gradient(
      135deg,
      rgba(212,175,106,.18),
      rgba(94,55,120,.26)
    );

  color:#f0d49a;

  font-size:16px;
  font-weight:700;

  letter-spacing:.28em;

  font-family:inherit;

  cursor:pointer;

  box-shadow:
    0 4px 18px
    rgba(94,55,120,.25);
}

/* ======================
MARKERS
====================== */

.q-marker{

  width:58px;
  height:58px;

  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  background:
    radial-gradient(
      circle at 30% 30%,
      #f0d49a,
      #8b6f3a
    );

  box-shadow:
    0 0 24px
    rgba(212,175,106,.35);

  animation:pulse 2s infinite;
}

@keyframes pulse{

  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.08);
  }

  100%{
    transform:scale(1);
  }
}

.q-marker-inner{

  color:#09070d;

  font-size:24px;
  font-weight:800;
}

/* ======================
REVEAL
====================== */

#reveal{

  position:absolute;
  inset:0;

  z-index:300;

  display:none;

  flex-direction:column;
  align-items:center;
  justify-content:center;

  padding:40px 26px;

  text-align:center;

  background:
    radial-gradient(
      ellipse at center,
      rgba(40,20,60,.4),
      rgba(10,7,16,.98)
    );
}

#reveal.show{
  display:flex;
}

#reveal-icon{

  font-size:92px;

  margin-bottom:22px;
}

#reveal-title{

  font-size:34px;
  font-weight:700;

  color:#f0d49a;
}

#reveal-sub{

  margin-top:10px;

  color:#8b7355;

  letter-spacing:.18em;
}

#reveal-desc{

  margin-top:24px;

  max-width:320px;

  line-height:1.9;

  font-size:13px;

  color:#bda98b;

  padding:18px;

  background:
    rgba(20,15,28,.5);

  border-left:
    2px solid
    rgba(212,175,106,.3);
}

#again{

  margin-top:28px;

  width:100%;
  max-width:320px;

  border:none;

  border-radius:16px;

  padding:
    16px 0;

  background:
    linear-gradient(
      135deg,
      rgba(212,175,106,.2),
      rgba(94,55,120,.3)
    );

  color:#f0d49a;

  font-size:14px;

  font-family:inherit;

  cursor:pointer;
}

</style>
</head>

<body>

<div id="map"></div>

<div id="top">

  <div id="brand">

    <div id="brand-jp">
      幽路
    </div>

    <div id="brand-en">
      yuro
    </div>

  </div>

  <div id="tagline">
    — 行き先は、辿り着いた者のみ知る —
  </div>

</div>

<div id="mode-bar">

  <button class="mode-btn active" data-mode="foot">
    🚶
  </button>

  <button class="mode-btn" data-mode="bike">
    🚴
  </button>

  <button class="mode-btn" data-mode="car">
    🚗
  </button>

</div>

<div id="dist">

  <div id="dist-num">
    —
  </div>

  <div id="dist-label">
    目的地まで
  </div>

</div>

<div id="bottom">

  <div id="error"></div>

  <button id="go">
    どこか連れてって
  </button>

</div>

<div id="reveal">

  <div id="reveal-icon">
    📍
  </div>

  <div id="reveal-title">
    名も無き場所
  </div>

  <div id="reveal-sub">
    UNKNOWN SPOT
  </div>

  <div id="reveal-desc">
    辿り着いた者のみが知る場所。
  </div>

  <button id="again">
    もう一度旅立つ
  </button>

</div>

<script>

/* ======================
MAP
====================== */

const map = L.map('map').setView(
  [35.6812,139.7671],
  14
);

L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',
  {
    attribution:'© OSM',
    subdomains:'abcd',
    maxZoom:20
  }
).addTo(map);

/* ======================
CONFIG
====================== */

const OSRM =
  'https://router.project-osrm.org/route/v1';

const MODE_DISTANCE = {
  foot:800,
  bike:4000,
  car:12000
};

const MODE_PROFILE = {
  foot:'foot',
  bike:'bike',
  car:'driving'
};

let mode = 'foot';

let userLat;
let userLon;

let targetLat;
let targetLon;

let routeLayer = null;

let selfMarker = null;
let targetMarker = null;

let arrived = false;

/* ======================
ICONS
====================== */

const selfIcon = L.divIcon({

  className:'',

  iconAnchor:[7,7],

  html:`
    <div style="
      width:14px;
      height:14px;
      border-radius:50%;
      background:#f0d49a;
      box-shadow:0 0 18px rgba(212,175,106,.9);
    "></div>
  `
});

const targetIcon = L.divIcon({

  className:'',

  iconAnchor:[29,29],

  html:`
    <div class="q-marker">
      <div class="q-marker-inner">
        ?
      </div>
    </div>
  `
});

/* ======================
UTIL
====================== */

function showError(text){

  const e =
    document.getElementById('error');

  e.textContent = text;

  e.style.display = 'block';
}

function hideError(){

  document.getElementById('error')
    .style.display = 'none';
}

function distance(
  lat1,
  lon1,
  lat2,
  lon2
){

  const R = 6371000;

  const dLat =
    (lat2-lat1)
    * Math.PI/180;

  const dLon =
    (lon2-lon1)
    * Math.PI/180;

  const a =
    Math.sin(dLat/2)**2
    +
    Math.cos(lat1*Math.PI/180)
    *
    Math.cos(lat2*Math.PI/180)
    *
    Math.sin(dLon/2)**2;

  return Math.round(
    R*2*Math.atan2(
      Math.sqrt(a),
      Math.sqrt(1-a)
    )
  );
}

function formatDistance(m){

  return m < 1000
    ? m + 'm'
    : (m/1000).toFixed(1) + 'km';
}

/* ======================
DIST
====================== */

function updateDistance(){

  if(
    !targetLat
    ||
    !userLat
  ) return;

  const d =
    distance(
      userLat,
      userLon,
      targetLat,
      targetLon
    );

  document.getElementById('dist')
    .classList.add('show');

  document.getElementById('dist-num')
    .textContent =
      formatDistance(d);

  if(
    d < 70
    &&
    !arrived
  ){

    arrived = true;

    document.getElementById('reveal')
      .classList.add('show');
  }
}

/* ======================
ROUTE
====================== */

async function drawRoute(){

  const url =
    `${OSRM}/${MODE_PROFILE[mode]}/${userLon},${userLat};${targetLon},${targetLat}?overview=full&geometries=geojson`;

  const res =
    await fetch(url);

  const data =
    await res.json();

  if(
    !data.routes
    ||
    !data.routes.length
  ){
    return;
  }

  if(routeLayer){
    map.removeLayer(routeLayer);
  }

  routeLayer =
    L.geoJSON(
      data.routes[0].geometry,
      {
        style:{
          color:'#d4af6a',
          weight:4,
          opacity:.85,
          dashArray:'2,12'
        }
      }
    ).addTo(map);

  map.fitBounds(
    routeLayer.getBounds(),
    {
      padding:[80,80]
    }
  );
}

/* ======================
GO
====================== */

async function go(){

  hideError();

  arrived = false;

  try{

    const pos =
      await new Promise(
        (
          resolve,
          reject
        ) => {

          navigator.geolocation.getCurrentPosition(
            resolve,
            reject,
            {
              enableHighAccuracy:true,
              timeout:10000
            }
          );
        }
      );

    userLat =
      pos.coords.latitude;

    userLon =
      pos.coords.longitude;

    if(!selfMarker){

      selfMarker =
        L.marker(
          [userLat,userLon],
          {
            icon:selfIcon
          }
        ).addTo(map);

    } else {

      selfMarker.setLatLng(
        [userLat,userLon]
      );
    }

    const angle =
      Math.random()
      * Math.PI
      * 2;

    const dist =
      MODE_DISTANCE[mode];

    targetLat =
      userLat
      +
      (
        dist / 111111
      )
      * Math.cos(angle);

    targetLon =
      userLon
      +
      (
        dist
        /
        (
          111111
          * Math.cos(
            userLat
            * Math.PI/180
          )
        )
      )
      * Math.sin(angle);

    if(targetMarker){
      map.removeLayer(targetMarker);
    }

    targetMarker =
      L.marker(
        [targetLat,targetLon],
        {
          icon:targetIcon
        }
      ).addTo(map);

    await drawRoute();

    navigator.geolocation.watchPosition(
      p => {

        userLat =
          p.coords.latitude;

        userLon =
          p.coords.longitude;

        selfMarker.setLatLng(
          [userLat,userLon]
        );

        updateDistance();
      }
    );

    updateDistance();

  } catch(e){

    showError(
      '位置情報を取得できません'
    );
  }
}

/* ======================
EVENT
====================== */

document.getElementById('go')
  .addEventListener(
    'click',
    go
  );

document.querySelectorAll('.mode-btn')
  .forEach(btn => {

    btn.addEventListener(
      'click',
      () => {

        document.querySelectorAll('.mode-btn')
          .forEach(
            b => b.classList.remove('active')
          );

        btn.classList.add('active');

        mode =
          btn.dataset.mode;
      }
    );
  });

document.getElementById('again')
  .addEventListener(
    'click',
    () => {

      document.getElementById('reveal')
        .classList.remove('show');
    }
  );

</script>

</body>
</html>
