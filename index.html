<!-- ===== 修正追加: map最適化 ===== -->
<style>
#map {
  will-change: transform;
  transform: translateZ(0);
}

/* blur軽量化 */
#mode-bar,
#dist-badge,
#reveal-modal {
  backdrop-filter: blur(8px) !important;
}

/* 霧エフェクト */
body::after {
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.03), transparent 40%),
    radial-gradient(circle at 80% 60%, rgba(255,255,255,0.02), transparent 40%);
  animation:fogMove 30s linear infinite;
}

@keyframes fogMove {
  from { transform:translateX(0); }
  to { transform:translateX(-100px); }
}
</style>

<script>
// ===== fetch timeout =====
async function fetchWithTimeout(url, options = {}, timeout = 12000) {
  const controller = new AbortController();
  const id = setTimeout(() => controller.abort(), timeout);

  try {
    return await fetch(url, {
      ...options,
      signal: controller.signal
    });
  } finally {
    clearTimeout(id);
  }
}

// ===== route layer 修正 =====
let routeLayer = null;
let routeShadow = null;

// ===== clearRoute 修正版 =====
function clearRoute() {
  if (routeLayer) {
    map.removeLayer(routeLayer);
    routeLayer = null;
  }

  if (routeShadow) {
    map.removeLayer(routeShadow);
    routeShadow = null;
  }
}

// ===== drawRoute 修正版 =====
async function drawRoute(fLat, fLon, tLat, tLon) {
  const url =
    `${OSRM}/${OSRM_PROFILE[mode]}/${fLon},${fLat};${tLon},${tLat}?overview=full&geometries=geojson`;

  const res = await fetchWithTimeout(url);

  const data = await res.json();

  if (!data.routes?.length) throw new Error('route');

  clearRoute();

  routeShadow = L.geoJSON(data.routes[0].geometry, {
    style: {
      color: '#5e3778',
      weight: 8,
      opacity: 0.3
    }
  }).addTo(map);

  routeLayer = L.geoJSON(data.routes[0].geometry, {
    style: {
      color: '#d4af6a',
      weight: 3,
      opacity: 0.85,
      lineCap: 'round',
      dashArray: '1, 8'
    }
  }).addTo(map);

  map.fitBounds(routeLayer.getBounds(), {
    padding: [80, 80]
  });
}

// ===== weightedPick 修正版 =====
function weightedPick(spots) {
  const idealDist = {
    foot: 1200,
    bike: 5000,
    car: 15000
  }[mode];

  const weights = spots.map(s => {
    const d = s.distance;

    let w = Math.exp(
      -Math.pow(d - idealDist, 2) /
      (2 * Math.pow(idealDist * 0.7, 2))
    );

    if (isHorror(s)) w *= 2.5;
    if (isEmotional(s)) w *= 2;

    if (!s.tags?.name) w *= 1.2;

    return w;
  });

  const total = weights.reduce((a,b)=>a+b,0);

  let r = Math.random() * total;

  for (let i=0;i<spots.length;i++) {
    r -= weights[i];

    if (r <= 0) return spots[i];
  }

  return spots[0];
}

// ===== 到着判定改善 =====
function updateDistBadge(lat, lon) {
  if (!spotLat) return;

  const d = haversine(lat, lon, spotLat, spotLon);

  document.getElementById('dist-badge')
    .classList.add('show');

  document.getElementById('dist-num')
    .textContent = fmtDist(d);

  const arriveDistance = {
    foot: 70,
    bike: 120,
    car: 250
  }[mode];

  if (d < arriveDistance && !arrived) {
    arrived = true;
    showReveal();
  }
}

// ===== fetchOSM 修正版 =====
async function fetchOSM(lat, lon, r) {

  const q = `[out:json][timeout:60];
(
  nwr["historic"](around:${r},${lat},${lon});

  nwr["historic"="wayside_shrine"](around:${r},${lat},${lon});

  nwr["man_made"~"cross|stele|survey_point"](around:${r},${lat},${lon});
  nwr["man_made"="memorial"](around:${r},${lat},${lon});

  nwr["tourism"~"artwork|viewpoint"](around:${r},${lat},${lon});

  nwr["natural"~"rock|stone|cave_entrance|cliff|spring|volcano|geyser|sinkhole|peak|arch"](around:${r},${lat},${lon});

  nwr["natural"="tree"]["name"](around:${r},${lat},${lon});
  nwr["natural"="tree"]["heritage"](around:${r},${lat},${lon});
  nwr["natural"="tree"]["denotation"](around:${r},${lat},${lon});
  nwr["natural"="tree"]["circumference"](around:${r},${lat},${lon});
  nwr["natural"="tree"]["species"](around:${r},${lat},${lon});
  nwr["natural"="tree"]["genus"](around:${r},${lat},${lon});

  nwr["waterway"="waterfall"](around:${r},${lat},${lon});

  nwr["man_made"~"water_tower|chimney|gasometer|lighthouse|mine_shaft|adit|kiln|windmill|watermill|silo"](around:${r},${lat},${lon});

  nwr["railway"="abandoned"](around:${r},${lat},${lon});

  nwr["abandoned"](around:${r},${lat},${lon});
  nwr["disused"](around:${r},${lat},${lon});
  nwr["ruins"](around:${r},${lat},${lon});

  nwr["amenity"="public_bath"](around:${r},${lat},${lon});

  nwr["shop"~"confectionery|hardware|newsagent|tobacco"](around:${r},${lat},${lon});

  nwr["craft"](around:${r},${lat},${lon});

  nwr["landuse"="cemetery"](around:${r},${lat},${lon});

  nwr["place"~"locality|hamlet|isolated_dwelling"](around:${r},${lat},${lon});
);
out center;`;

  for (const server of OVERPASS_SERVERS) {
    try {

      const res = await fetchWithTimeout(
        server,
        {
          method: 'POST',
          body: 'data=' + encodeURIComponent(q)
        },
        15000
      );

      if (!res.ok) continue;

      const data = await res.json();

      return (data.elements || [])
        .map(e => ({
          lat: e.lat ?? e.center?.lat,
          lon: e.lon ?? e.center?.lon,
          tags: e.tags || {},
          source: 'osm',
          id: 'osm-' + e.id,
        }))
        .filter(e => e.lat && e.lon)
        .filter(e => !isExcluded(e));

    } catch (e) {}
  }

  return [];
}

// ===== fetchAllSpots 修正版 =====
async function fetchAllSpots(lat, lon) {

  const r = getRadius();

  const [osm, wd] = await Promise.all([
    fetchOSM(lat, lon, r),
    fetchWikidata(lat, lon, r)
  ]);

  let all = [...osm, ...wd];

  all = all
    .map(s => ({
      ...s,
      distance: haversine(lat, lon, s.lat, s.lon)
    }))
    .filter(s => s.distance > 50)
    .filter(s => !badReports.includes(s.id))
    .filter(s => !recentPicks.includes(s.id));

  // ===== 重複除去 =====
  const seen = new Set();

  all = all.filter(s => {

    const key =
      Math.round(s.lat * 10000) + ':' +
      Math.round(s.lon * 10000);

    if (seen.has(key)) return false;

    seen.add(key);

    return true;
  });

  if (horror) {
    all = all.filter(isHorror);
  } else if (emotion) {
    all = all.filter(isEmotional);
  }

  return all;
}

// ===== watchPosition 修正版 =====
function startWatchPosition() {

  if (watchId) {
    navigator.geolocation.clearWatch(watchId);
  }

  watchId = navigator.geolocation.watchPosition(
    p => {

      updateSelf(
        p.coords.latitude,
        p.coords.longitude
      );

      if (
        !map.getBounds().contains([
          p.coords.latitude,
          p.coords.longitude
        ])
      ) {
        map.panTo([
          p.coords.latitude,
          p.coords.longitude
        ]);
      }

    },
    null,
    {
      enableHighAccuracy: mode === 'foot',
      maximumAge: 5000,
      timeout: 10000
    }
  );
}
</script>
