html <!DOCTYPE html> <html lang="ja"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  <title>幽路 — yuro</title>  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700;800&display=swap" rel="stylesheet">  <link   rel="stylesheet"   href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>  <style>  *{   margin:0;   padding:0;   box-sizing:border-box;   -webkit-tap-highlight-color:transparent; }  html, body{   width:100%;   height:100%;   overflow:hidden;    background:#09070d;   color:#e8d9b8;    font-family:     'Shippori Mincho',     serif; }  /* ========================= MAP ========================= */  #map{   position:absolute;   inset:0;    transform:translateZ(0);   will-change:transform;    filter:     brightness(.72)     contrast(1.1)     saturate(.92)     hue-rotate(-10deg);    z-index:0; }  .leaflet-control-attribution{   display:none; }  .leaflet-control-zoom{   border:none!important;   background:rgba(10,7,16,.82)!important; }  .leaflet-control-zoom a{   background:transparent!important;   color:#b89b68!important;   border:none!important; }  /* ========================= FOG ========================= */  body::after{    content:'';    position:fixed;   inset:0;    pointer-events:none;    background:     radial-gradient(       circle at 20% 30%,       rgba(255,255,255,.02),       transparent 45%     ),     radial-gradient(       circle at 80% 60%,       rgba(255,255,255,.015),       transparent 40%     );    opacity:.35; }  /* ========================= TOP ========================= */  #top-overlay{    position:absolute;    top:0;   left:0;   right:0;    z-index:100;    padding:     52px 22px     26px;    background:     linear-gradient(       to bottom,       rgba(10,7,16,.92),       transparent     ); }  #brand{   display:flex;   align-items:baseline;   gap:12px; }  #brand-jp{    font-size:30px;   font-weight:800;    letter-spacing:.28em;    color:transparent;    background:     linear-gradient(       135deg,       #f0d49a,       #b28a48     );    -webkit-background-clip:text;   background-clip:text;    text-shadow:     0 0 18px     rgba(212,175,106,.28); }  #brand-en{    font-size:10px;    letter-spacing:.45em;    color:#66576e; }  #tagline{    margin-top:10px;    font-size:11px;    color:#77657e;    letter-spacing:.18em;    font-style:italic; }  /* ========================= MODE BAR ========================= */  #mode-bar{    position:absolute;    top:118px;   left:50%;    transform:     translateX(-50%);    z-index:100;    display:flex;   gap:6px;    padding:6px;    border-radius:28px;    background:     rgba(10,7,16,.9);    border:     1px solid     rgba(212,175,106,.15); }  .mode-btn{    border:none;    background:transparent;    color:#6e5c78;    padding:     10px 16px;    border-radius:22px;    font-size:16px;    cursor:pointer; }  .mode-btn.active{    color:#f0d49a;    background:     linear-gradient(       135deg,       rgba(212,175,106,.15),       rgba(94,55,120,.22)     ); }  /* ========================= DIST ========================= */  #dist-badge{    position:absolute;    top:50%;   left:50%;    transform:     translate(-50%,-50%);    z-index:120;    display:none;    padding:     18px 30px;    border-radius:24px;    background:     rgba(10,7,16,.92);    border:     1px solid     rgba(212,175,106,.22);    text-align:center; }  #dist-badge.show{   display:block; }  #dist-num{    font-size:38px;   font-weight:700;    color:#f0d49a; }  #dist-unit{    margin-top:6px;    font-size:11px;    color:#8b7355;    letter-spacing:.2em; }  /* ========================= BOTTOM ========================= */  #bottom{    position:absolute;    left:0;   right:0;   bottom:0;    z-index:100;    padding:     20px     18px     40px;    background:     linear-gradient(       to top,       rgba(10,7,16,.96),       transparent     ); }  #error-msg{    display:none;    margin-bottom:12px;    padding:12px;    border-radius:12px;    background:     rgba(60,20,20,.5);    color:#d7aaaa;    font-size:12px; }  #go-btn{    width:100%;    border:none;    border-radius:18px;    padding:     18px 0;    font-size:16px;   font-weight:700;    font-family:inherit;    letter-spacing:.28em;    cursor:pointer; }  #go-btn.ready{    color:#f0d49a;    background:     linear-gradient(       135deg,       rgba(212,175,106,.18),       rgba(94,55,120,.26)     );    border:     1px solid     rgba(212,175,106,.3);    box-shadow:     0 4px 18px     rgba(94,55,120,.28); }  #go-btn.loading{    color:#6d5f74;    background:     rgba(20,15,28,.8); }  /* ========================= MARKER ========================= */  .q-marker{    width:58px;   height:58px;    border-radius:50%;    background:     radial-gradient(       circle at 30% 30%,       #f0d49a,       #8b6f3a     );    display:flex;   align-items:center;   justify-content:center;    box-shadow:     0 0 18px     rgba(212,175,106,.3); }  .q-marker-inner{    font-size:24px;   font-weight:800;    color:#09070d; }  /* ========================= LOADING LORE ========================= */  #loading-lore{    position:absolute;    top:50%;   left:50%;    transform:     translate(-50%,-50%);    z-index:999;    color:#b8a080;    font-size:13px;    letter-spacing:.25em;    opacity:0;    transition:opacity .4s;    pointer-events:none; }  #loading-lore.show{   opacity:1; }  /* ========================= REVEAL ========================= */  #reveal-modal{    position:absolute;   inset:0;    z-index:300;    display:none;    flex-direction:column;   align-items:center;   justify-content:center;    padding:40px 26px;    text-align:center;    background:     radial-gradient(       ellipse at center,       rgba(40,20,60,.42),       rgba(10,7,16,.98)     ); }  #reveal-modal.show{    display:flex;    animation:     revealFade .7s ease; }  @keyframes revealFade{    from{     opacity:0;     transform:scale(1.02);   }    to{     opacity:1;     transform:scale(1);   } }  #reveal-icon{    font-size:92px;    margin-bottom:24px; }  #reveal-name{    font-size:34px;   font-weight:700;    line-height:1.4;    color:#f0d49a;    text-shadow:     0 0 20px     rgba(212,175,106,.22); }  #reveal-cat{    margin-top:10px;    color:#8b7355;    letter-spacing:.2em; }  #reveal-desc{    margin-top:24px;    max-width:320px;    padding:18px;    border-left:     2px solid     rgba(212,175,106,.3);    background:     rgba(20,15,28,.45);    color:#b8a080;    line-height:1.9;    font-size:13px; }  #reveal-actions{    margin-top:28px;    width:100%;   max-width:320px;    display:flex;   gap:10px; }  .reveal-btn{    flex:1;    border:none;    border-radius:14px;    padding:14px 0;    background:     rgba(20,15,28,.7);    color:#b8a080;    font-family:inherit;    cursor:pointer; }  .reveal-btn.primary{    color:#f0d49a;    background:     linear-gradient(       135deg,       rgba(212,175,106,.2),       rgba(94,55,120,.3)     ); }  </style> </head>  <body>  <div id="map"></div>  <div id="top-overlay">    <div id="brand">      <span id="brand-jp">       幽路     </span>      <span id="brand-en">       yuro     </span>    </div>    <div id="tagline">     — 行き先は、辿り着いた者のみ知る —   </div>  </div>  <div id="mode-bar">    <button     class="mode-btn active"     data-mode="foot"   >     🚶   </button>    <button     class="mode-btn"     data-mode="bike"   >     🚴   </button>    <button     class="mode-btn"     data-mode="car"   >     🚗   </button>  </div>  <div id="dist-badge">    <div id="dist-num">     —   </div>    <div id="dist-unit">     目的地まで   </div>  </div>  <div id="loading-lore"></div>  <div id="bottom">    <div id="error-msg"></div>    <button     id="go-btn"     class="ready"   >     どこか連れてって   </button>  </div>  <div id="reveal-modal">    <div id="reveal-icon">     📍   </div>    <div id="reveal-name">     名も無き場所   </div>    <div id="reveal-cat">     謎   </div>    <div id="reveal-desc"></div>    <div id="reveal-actions">      <button       class="reveal-btn"       id="reveal-bad"     >       外れ報告     </button>      <button       class="reveal-btn primary"       id="reveal-again"     >       もう一度旅立つ     </button>    </div>  </div>  <script>  /* ========================= BASE ========================= */  const map = L.map('map', {   zoomControl:true }).setView([35.6812,139.7671],14);  L.tileLayer(   'https://tiles.stadiamaps.com/tiles/alidade_smooth_dark/{z}/{x}/{y}{r}.png',   {     attribution:'© Stadia © OSM',     maxZoom:20   } ).addTo(map);  const OSRM =   'https://router.project-osrm.org/route/v1';  const MODE_RADIUS = {   foot:1500,   bike:5000,   car:15000 };  const OSRM_PROFILE = {   foot:'foot',   bike:'bike',   car:'driving' };  let mode = 'foot';  let userLat; let userLon;  let spotLat; let spotLon;  let arrived = false;  let routeLayer = null;  let selfMarker = null; let destMarker = null;  /* ========================= LORE ========================= */  const LORE = [    '気配を辿っています...',   '土地の記憶を掘り起こしています...',   '失われた地点を照合中...',   '古い道筋を探索しています...',   '誰かの記憶を受信しています...' ];  function showLore(){    const el =     document.getElementById(       'loading-lore'     );    el.textContent =     LORE[       Math.floor(         Math.random()         * LORE.length       )     ];    el.classList.add('show'); }  function hideLore(){    document     .getElementById(       'loading-lore'     )     .classList.remove('show'); }  /* ========================= ICONS ========================= */  const selfIcon = L.divIcon({    className:'',    iconAnchor:[7,7],    html:`   <div style="     width:14px;     height:14px;     border-radius:50%;     background:#f0d49a;     box-shadow:       0 0 18px rgba(212,175,106,.8);   "></div>   ` });  const destIcon = L.divIcon({    className:'',    iconAnchor:[29,29],    html:`   <div class="q-marker">     <div class="q-marker-inner">       ?     </div>   </div>   ` });  /* ========================= UTIL ========================= */  function fmtDist(m){    return m < 1000     ? m + 'm'     : (m / 1000).toFixed(1) + 'km'; }  function haversine(   lat1,   lon1,   lat2,   lon2 ){    const R = 6371000;    const dLat =     (lat2-lat1)     * Math.PI/180;    const dLon =     (lon2-lon1)     * Math.PI/180;    const a =     Math.sin(dLat/2)**2     +     Math.cos(lat1*Math.PI/180)     *     Math.cos(lat2*Math.PI/180)     *     Math.sin(dLon/2)**2;    return Math.round(     R*2*Math.atan2(       Math.sqrt(a),       Math.sqrt(1-a)     )   ); }  function setBtn(state,text){    const b =     document.getElementById(       'go-btn'     );    b.className = state;    b.textContent = text;    b.disabled =     state !== 'ready'; }  function showError(msg){    const el =     document.getElementById(       'error-msg'     );    el.textContent = msg;    el.style.display='block'; }  function hideError(){    document     .getElementById(       'error-msg'     )     .style.display='none'; }  /* ========================= DIST ========================= */  function updateDist(){    if (     !spotLat     ||     !userLat   ) return;    const d =     haversine(       userLat,       userLon,       spotLat,       spotLon     );    document     .getElementById(       'dist-badge'     )     .classList.add('show');    document     .getElementById(       'dist-num'     )     .textContent =       fmtDist(d);    if (     d < 70     &&     !arrived   ){      arrived = true;      showReveal();   } }  /* ========================= REVEAL ========================= */  function showReveal(){    document     .getElementById(       'reveal-modal'     )     .classList.add('show'); }  function reset(){    arrived = false;    document     .getElementById(       'reveal-modal'     )     .classList.remove('show');    document     .getElementById(       'dist-badge'     )     .classList.remove('show'); }  /* ========================= ROUTE ========================= */  async function drawRoute(   fLat,   fLon,   tLat,   tLon ){    const url =     `${OSRM}/${OSRM_PROFILE[mode]}/${fLon},${fLat};${tLon},${tLat}?overview=full&geometries=geojson`;    const res =     await fetch(url);    const data =     await res.json();    if (     !data.routes?.length   ){     throw new Error('route');   }    if (routeLayer){     map.removeLayer(routeLayer);   }    routeLayer =     L.geoJSON(       data.routes[0].geometry,       {         style:{           color:'#d4af6a',           weight:4,           opacity:.88,           dashArray:'2,12'         }       }     ).addTo(map);    map.fitBounds(     routeLayer.getBounds(),     {       padding:[80,80]     }   ); }  /* ========================= GO ========================= */  async function go(){    hideError();    showLore();    setBtn(     'loading',     '探索中...'   );    try{      const pos =       await new Promise(         (           resolve,           reject         ) => {            navigator             .geolocation             .getCurrentPosition(               resolve,               reject,               {                 enableHighAccuracy:true,                 timeout:10000               }             );         }       );      userLat =       pos.coords.latitude;      userLon =       pos.coords.longitude;      if (!selfMarker){        selfMarker =         L.marker(           [userLat,userLon],           {             icon:selfIcon           }         ).addTo(map);      } else {        selfMarker.setLatLng(         [userLat,userLon]       );     }      const angle =       Math.random()       * Math.PI       * 2;      const dist =       mode === 'foot'       ? 800       : mode === 'bike'       ? 4000       : 12000;      spotLat =       userLat       +       (dist/111111)       * Math.cos(angle);      spotLon =       userLon       +       (         dist         /         (           111111           * Math.cos(             userLat             * Math.PI/180           )         )       )       * Math.sin(angle);      if (destMarker){       map.removeLayer(destMarker);     }      map.flyTo(       [spotLat,spotLon],       16,       {         duration:4       }     );      setTimeout(() => {        destMarker =         L.marker(           [spotLat,spotLon],           {             icon:destIcon           }         ).addTo(map);      },1200);      await drawRoute(       userLat,       userLon,       spotLat,       spotLon     );      updateDist();      navigator       .geolocation       .watchPosition(         p => {            userLat =             p.coords.latitude;            userLon =             p.coords.longitude;            selfMarker.setLatLng(             [userLat,userLon]           );            updateDist();         }       );      setBtn(       'ready',       '別の場所へ'     );    } catch(e){      showError(       '位置情報を取得できません'     );      setBtn(       'ready',       'どこか連れてって'     );   }    setTimeout(     hideLore,     2500   ); }  /* ========================= EVENTS ========================= */  document   .getElementById(     'go-btn'   )   .addEventListener(     'click',     go   );  document   .querySelectorAll(     '.mode-btn'   )   .forEach(btn => {      btn.addEventListener(       'click',       () => {          document           .querySelectorAll(             '.mode-btn'           )           .forEach(             b => b.classList.remove('active')           );          btn.classList.add('active');          mode =           btn.dataset.mode;       }     );   });  document   .getElementById(     'reveal-again'   )   .addEventListener(     'click',     reset   );  </script>  </body> </html>
