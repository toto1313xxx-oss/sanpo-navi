<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>幽路 — yuro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700;800&family=Noto+Serif+JP:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: #0a0710; color: #e8d9b8; font-family: 'Shippori Mincho', 'Noto Serif JP', serif; }

/* 地図 */
#map {
  position: absolute; inset: 0;
  filter: brightness(0.75) contrast(1.1) hue-rotate(-15deg);
  z-index: 0;
}
.leaflet-control-attribution {
  font-size: 8px !important; background: rgba(10,7,16,0.5) !important;
  color: #3a3040 !important; font-family: sans-serif !important;
}
.leaflet-control-attribution a { color: #5a4a60 !important; }
.leaflet-control-zoom {
  border: none !important;
  background: rgba(10,7,16,0.8) !important;
  margin-bottom: 130px !important;
}
.leaflet-control-zoom a {
  background: transparent !important;
  color: #8b7355 !important;
  border-bottom: 1px solid rgba(139,115,85,0.2) !important;
  font-family: serif !important;
}

/* オーバーレイ：上部 */
#top-overlay {
  position: absolute; top: 0; left: 0; right: 0;
  padding: 52px 20px 24px;
  background: linear-gradient(to bottom, rgba(10,7,16,0.92) 50%, transparent);
  z-index: 100; pointer-events: none;
}
#brand {
  display: flex; align-items: baseline; gap: 14px;
}
#brand-jp {
  font-size: 28px; font-weight: 800; letter-spacing: 0.3em;
  color: transparent;
  background: linear-gradient(135deg, #d4af6a 0%, #8b6f3a 50%, #d4af6a 100%);
  -webkit-background-clip: text; background-clip: text;
  text-shadow: 0 0 20px rgba(212,175,106,0.3);
}
#brand-en {
  font-size: 10px; color: #5a4a60; letter-spacing: 0.4em;
  font-family: sans-serif; text-transform: uppercase;
}
#tagline {
  font-size: 11px; color: #6a5a70; margin-top: 8px;
  letter-spacing: 0.15em; font-style: italic;
}

/* モード切替 */
#mode-bar {
  position: absolute; top: 120px; left: 50%; transform: translateX(-50%);
  z-index: 100;
  display: flex; gap: 4px;
  background: rgba(10,7,16,0.85);
  border: 1px solid rgba(139,115,85,0.25);
  border-radius: 24px;
  padding: 4px;
  backdrop-filter: blur(20px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(212,175,106,0.1);
}
.mode-btn {
  padding: 8px 18px; border-radius: 20px;
  border: none; background: transparent;
  color: #5a4a60; font-size: 15px;
  cursor: pointer; transition: all 0.3s;
  -webkit-appearance: none;
}
.mode-btn.active {
  background: linear-gradient(135deg, rgba(212,175,106,0.2), rgba(94,55,120,0.2));
  color: #d4af6a;
  box-shadow: inset 0 0 8px rgba(212,175,106,0.2);
}

/* 距離バッジ */
#dist-badge {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  z-index: 100;
  display: none;
  background: radial-gradient(ellipse at center, rgba(10,7,16,0.95), rgba(20,10,30,0.95));
  border: 1px solid rgba(212,175,106,0.3);
  border-radius: 24px;
  padding: 18px 32px;
  text-align: center;
  backdrop-filter: blur(20px);
  pointer-events: none;
  box-shadow: 0 0 30px rgba(94,55,120,0.4), inset 0 1px 0 rgba(212,175,106,0.15);
}
#dist-badge.show { display: block; animation: float 3s ease-in-out infinite; }
@keyframes float {
  0%, 100% { transform: translate(-50%, -50%); }
  50% { transform: translate(-50%, calc(-50% - 6px)); }
}
#dist-num {
  font-size: 38px; font-weight: 700;
  background: linear-gradient(135deg, #f0d49a, #d4af6a);
  -webkit-background-clip: text; background-clip: text;
  color: transparent;
  letter-spacing: -0.02em; line-height: 1;
}
#dist-unit {
  font-size: 11px; color: #6a5a70;
  margin-top: 6px; letter-spacing: 0.2em;
}

/* ボトムパネル */
#bottom {
  position: absolute; bottom: 0; left: 0; right: 0;
  z-index: 100;
  padding: 20px 16px 40px;
  background: linear-gradient(to top, rgba(10,7,16,0.98) 65%, transparent);
}

#go-btn {
  width: 100%; padding: 17px 0;
  border-radius: 16px; border: 1px solid transparent;
  font-size: 16px; font-weight: 700;
  font-family: inherit; letter-spacing: 0.3em;
  cursor: pointer; transition: all 0.4s;
  -webkit-appearance: none;
  position: relative; overflow: hidden;
}
#go-btn.ready {
  background:
    linear-gradient(135deg, rgba(212,175,106,0.15), rgba(94,55,120,0.2)),
    radial-gradient(ellipse at top, rgba(212,175,106,0.1), transparent);
  border-color: rgba(212,175,106,0.4);
  color: #f0d49a;
  box-shadow:
    0 4px 24px rgba(94,55,120,0.4),
    inset 0 1px 0 rgba(212,175,106,0.3),
    inset 0 -1px 0 rgba(94,55,120,0.2);
  text-shadow: 0 0 8px rgba(212,175,106,0.5);
}
#go-btn.ready:active {
  transform: scale(0.98);
  box-shadow: 0 2px 12px rgba(94,55,120,0.6);
}
#go-btn.loading {
  background: rgba(20,15,28,0.8);
  color: #4a3a50;
  border-color: rgba(139,115,85,0.15);
  cursor: not-allowed;
}

/* エラー */
#error-msg {
  display: none;
  font-size: 12px; color: #c89090; line-height: 1.7;
  margin-bottom: 12px; padding: 12px 14px;
  background: linear-gradient(135deg, rgba(40,10,20,0.6), rgba(20,5,15,0.6));
  border: 1px solid rgba(180,80,80,0.25);
  border-radius: 10px;
  backdrop-filter: blur(10px);
}

/* 到着モーダル */
#reveal-modal {
  display: none;
  position: absolute; inset: 0; z-index: 300;
  background:
    radial-gradient(ellipse at center, rgba(40,20,60,0.4), rgba(10,7,16,0.98)),
    rgba(10,7,16,0.97);
  flex-direction: column; align-items: center; justify-content: center;
  padding: 40px 28px;
}
#reveal-modal.show { display: flex; animation: revealIn 0.8s ease; }
@keyframes revealIn {
  from { opacity: 0; backdrop-filter: blur(0px); }
  to { opacity: 1; backdrop-filter: blur(20px); }
}

#reveal-ornament {
  font-size: 14px; color: #6a5a70; letter-spacing: 1em;
  margin-bottom: 24px; animation: fadeUp 0.6s 0.2s both;
}
#reveal-icon {
  font-size: 88px;
  margin-bottom: 24px;
  filter: drop-shadow(0 0 30px rgba(212,175,106,0.5));
  animation: revealIcon 0.8s 0.3s both;
}
@keyframes revealIcon {
  from { transform: scale(0.3) rotate(-20deg); opacity: 0; }
  60% { transform: scale(1.1) rotate(5deg); }
  to { transform: scale(1) rotate(0); opacity: 1; }
}
#reveal-label {
  font-size: 10px; color: #d4af6a; letter-spacing: 0.6em;
  margin-bottom: 16px;
  font-family: sans-serif;
  animation: fadeUp 0.6s 0.5s both;
}
#reveal-name {
  font-size: 30px; font-weight: 700;
  text-align: center; line-height: 1.4;
  margin-bottom: 12px; max-width: 320px;
  background: linear-gradient(135deg, #f0d49a, #d4af6a 50%, #f0d49a);
  -webkit-background-clip: text; background-clip: text;
  color: transparent;
  animation: fadeUp 0.6s 0.7s both;
}
#reveal-cat {
  font-size: 13px; color: #8b7355;
  margin-bottom: 28px; letter-spacing: 0.2em;
  animation: fadeUp 0.6s 0.85s both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
#reveal-desc {
  font-size: 13px; color: #a8927a; line-height: 1.9; text-align: center;
  margin-bottom: 28px; max-width: 320px;
  padding: 16px 18px;
  background: rgba(20,15,28,0.5);
  border-left: 2px solid rgba(212,175,106,0.4);
  border-radius: 4px;
  animation: fadeUp 0.6s 1s both;
}
#reveal-desc:empty { display: none; }

#reveal-actions {
  display: flex; gap: 10px; width: 100%; max-width: 320px;
  animation: fadeUp 0.6s 1.2s both;
}
.reveal-btn {
  flex: 1; padding: 13px 0;
  border-radius: 12px; border: 1px solid rgba(139,115,85,0.3);
  background: rgba(20,15,28,0.6);
  color: #a8927a; font-size: 13px; font-weight: 500;
  font-family: inherit; cursor: pointer;
  letter-spacing: 0.15em;
  -webkit-appearance: none;
}
.reveal-btn.primary {
  background: linear-gradient(135deg, rgba(212,175,106,0.2), rgba(94,55,120,0.3));
  border-color: rgba(212,175,106,0.5);
  color: #f0d49a;
}

/* マーカー */
.q-marker {
  position: relative;
  width: 44px; height: 44px;
  background: radial-gradient(circle at 30% 30%, #d4af6a, #8b6f3a);
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  display: flex; align-items: center; justify-content: center;
  box-shadow:
    0 4px 16px rgba(94,55,120,0.6),
    0 0 24px rgba(212,175,106,0.4),
    inset 0 -2px 4px rgba(0,0,0,0.3);
  animation: markerPulse 2.5s ease-in-out infinite;
}
@keyframes markerPulse {
  0%, 100% { box-shadow: 0 4px 16px rgba(94,55,120,0.6), 0 0 24px rgba(212,175,106,0.4), inset 0 -2px 4px rgba(0,0,0,0.3); }
  50% { box-shadow: 0 4px 20px rgba(94,55,120,0.8), 0 0 40px rgba(212,175,106,0.7), inset 0 -2px 4px rgba(0,0,0,0.3); }
}
.q-marker-inner {
  transform: rotate(45deg);
  font-size: 18px; font-weight: 800; color: #0a0710;
  font-family: serif;
}

/* スピナー */
.spinner {
  display: inline-block;
  width: 12px; height: 12px;
  border: 2px solid rgba(212,175,106,0.2);
  border-top-color: #d4af6a;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-right: 8px;
  vertical-align: -2px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="map"></div>

<div id="top-overlay">
  <div id="brand">
    <span id="brand-jp">幽路</span>
    <span id="brand-en">yuro</span>
  </div>
  <div id="tagline">— 行き先は、辿り着いた者のみ知る —</div>
</div>

<div id="mode-bar">
  <button class="mode-btn active" data-mode="foot">🚶</button>
  <button class="mode-btn" data-mode="bike">🚴</button>
  <button class="mode-btn" data-mode="car">🚗</button>
  <div style="width:1px;background:rgba(139,115,85,0.3);margin:4px 2px;"></div>
  <button class="mode-btn" id="mania-btn" title="マニア">⚡</button>
  <button class="mode-btn" id="emotion-btn" title="感動">✨</button>
  <button class="mode-btn" id="horror-btn" title="恐怖">👻</button>
</div>

<div id="dist-badge">
  <div id="dist-num">—</div>
  <div id="dist-unit">目的地まで</div>
</div>

<div id="debug-panel" style="
  display: none;
  position: absolute; top: 175px; left: 50%; transform: translateX(-50%);
  z-index: 100;
  background: rgba(10,7,16,0.92);
  border: 1px solid rgba(212,175,106,0.4);
  border-radius: 10px;
  padding: 10px 14px;
  backdrop-filter: blur(10px);
  max-width: 90%;
  text-align: center;
  font-size: 11px;
  color: #d4af6a;
  letter-spacing: 0.05em;
  line-height: 1.6;
">
  <div style="font-size:9px;color:#8b6f3a;letter-spacing:0.3em;margin-bottom:4px;">[DEBUG]</div>
  <div id="debug-name" style="color:#f0d49a;font-weight:700;"></div>
  <div id="debug-meta" style="font-size:10px;color:#8b7355;margin-top:2px;"></div>
  <div style="display:flex;gap:6px;justify-content:center;margin-top:8px;">
    <a id="debug-wiki" href="#" target="_blank" rel="noopener" style="
      display:none;
      padding:4px 12px;
      background:rgba(212,175,106,0.15);
      border:1px solid rgba(212,175,106,0.4);
      border-radius:6px;
      color:#f0d49a;
      font-size:10px;
      text-decoration:none;
      letter-spacing:0.1em;
    ">Wikipedia ↗</a>
    <a id="debug-gmap" href="#" target="_blank" rel="noopener" style="
      padding:4px 12px;
      background:rgba(94,55,120,0.2);
      border:1px solid rgba(94,55,120,0.5);
      border-radius:6px;
      color:#c0a0d0;
      font-size:10px;
      text-decoration:none;
      letter-spacing:0.1em;
    ">📍 Googleマップ ↗</a>
  </div>
</div>

<div id="bottom">
  <div id="error-msg"></div>
  <button id="go-btn" class="ready">どこか連れてって</button>
</div>

<div id="reveal-modal">
  <div id="reveal-ornament">◆ ◆ ◆</div>
  <div id="reveal-icon">📍</div>
  <div id="reveal-label">ARRIVED</div>
  <div id="reveal-name">名無しの謎スポット</div>
  <div id="reveal-cat">謎のスポット</div>
  <div id="reveal-desc"></div>
  <div id="reveal-actions">
    <button class="reveal-btn" id="reveal-bad">外れ報告</button>
    <button class="reveal-btn primary" id="reveal-again">もう一度旅立つ</button>
  </div>
</div>

<script>
const OSRM = 'https://router.project-osrm.org/route/v1';
const OVERPASS_SERVERS = [
  'https://overpass-api.de/api/interpreter',
  'https://overpass.kumi.systems/api/interpreter',
  'https://overpass.openstreetmap.ru/api/interpreter',
];
const MODE_RADIUS = { foot: 1500, bike: 5000, car: 15000 };
const OSRM_PROFILE = { foot: 'foot', bike: 'bike', car: 'driving' };

const CATEGORY_LABELS = {
  archaeological_site: '遺跡', ruins: '廃墟', monument: '碑',
  memorial: '記念碑', wayside_shrine: '道祖神', boundary_stone: '境界石',
  stone: '謎の石', rock: '奇岩', cave_entrance: '洞窟', cliff: '断崖',
  shrine: '祠', place_of_worship: '社寺', castle: '城跡',
  tomb: '塚', milestone: '里程標', well: '古井戸',
  artwork: 'モニュメント', viewpoint: '展望地',
  tree: '名木', water_tower: '給水塔', chimney: '煙突',
  lighthouse: '燈台', gasometer: 'ガスタンク',
  abandoned: '廃線跡', cemetery: '墓所',
  vending_machine: '謎の自販機', telephone: '公衆電話',
  toilets: '公衆便所', bench: 'ベンチ', drinking_water: '水場',
  fountain: '噴水', bridge: '橋', steps: '石段',
  public_bath: '銭湯', sento: '銭湯',
  bunker: '防空壕跡', mine: '坑道',
  spring: '湧水', volcano: '火口',
  wikipedia: '伝承の地', wikidata: '文学の舞台',
};

let mode = 'foot';
let mania = false;
let emotion = false;
let horror = false;
let recentPicks = JSON.parse(localStorage.getItem('recentPicks') || '[]');
let userLat, userLon;
let spotLat, spotLon, spotTags, spotName, spotDesc, spotSource;
let spots = [], chosen = null;
let routeLayer = null, selfMarker = null, destMarker = null;
let watchId = null;
let arrived = false;
let badReports = JSON.parse(localStorage.getItem('badReports') || '[]');

// ---- 地図 ----
const map = L.map('map', { zoomControl: false, attributionControl: true })
  .setView([35.6812, 139.7671], 14);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
  attribution: '© CARTO © OSM',
  subdomains: 'abcd', maxZoom: 19,
}).addTo(map);

L.control.zoom({ position: 'bottomright' }).addTo(map);

// ---- アイコン ----
const selfIcon = L.divIcon({
  html: `<div style="
    width:14px;height:14px;
    background:radial-gradient(circle,#d4af6a,#8b6f3a);
    border:2px solid rgba(255,240,200,0.9);
    border-radius:50%;
    box-shadow:0 0 16px rgba(212,175,106,0.9), 0 0 30px rgba(94,55,120,0.5);
  "></div>`,
  className: '', iconAnchor: [7, 7],
});

const destIcon = L.divIcon({
  html: '<div class="q-marker"><div class="q-marker-inner">?</div></div>',
  className: '', iconAnchor: [22, 44],
});

// ---- ユーティリティ ----
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

function getIcon(tags, source) {
  if (source === 'wikipedia') return '📖';
  if (source === 'wikidata') return '🔮';
  if (source === 'gsi') return '🗾';
  if (!tags) return '📍';
  if (tags.historic === 'wayside_shrine') return '⛩️';
  if (tags.historic === 'ruins') return '🏚️';
  if (tags.historic === 'castle') return '🏯';
  if (tags.historic === 'tomb') return '⚱️';
  if (tags.historic === 'boundary_stone') return '🪨';
  if (tags.historic === 'milestone') return '🪧';
  if (tags.historic === 'well') return '🪣';
  if (tags.historic === 'monument' || tags.historic === 'memorial') return '🗿';
  if (tags.historic) return '🏛️';
  if (tags.tourism === 'artwork') return '🎨';
  if (tags.tourism === 'viewpoint') return '🔭';
  if (tags.natural === 'rock') return '🪨';
  if (tags.natural === 'cave_entrance') return '🕳️';
  if (tags.natural === 'cliff') return '⛰️';
  if (tags.natural === 'tree') return '🌳';
  if (tags.natural === 'spring') return '💧';
  if (tags.natural === 'volcano') return '🌋';
  if (tags.man_made === 'water_tower') return '🗼';
  if (tags.man_made === 'chimney') return '🏭';
  if (tags.man_made === 'lighthouse') return '🚨';
  if (tags.man_made === 'gasometer') return '⚙️';
  if (tags.man_made === 'mine_shaft' || tags.man_made === 'adit') return '⛏️';
  if (tags.man_made === 'bunker_silo') return '🪖';
  if (tags.man_made === 'bridge') return '🌉';
  if (tags.railway === 'abandoned') return '🛤️';
  if (tags.amenity === 'place_of_worship') return '🏮';
  if (tags.amenity === 'public_bath') return '♨️';
  if (tags.amenity === 'fountain') return '⛲';
  if (tags.amenity === 'drinking_water') return '💧';
  if (tags.amenity === 'vending_machine') return '🥤';
  if (tags.amenity === 'telephone') return '☎️';
  if (tags.amenity === 'toilets') return '🚻';
  if (tags.amenity === 'bench') return '🪑';
  if (tags.highway === 'steps') return '🪜';
  if (tags.landuse === 'cemetery') return '⚰️';
  if (tags.abandoned) return '🏚️';
  return '📍';
}

function getLabel(tags, name, source) {
  if (name) return name;
  if (tags?.name) return tags.name;
  if (tags?.['name:ja']) return tags['name:ja'];
  const t = tags?.historic || tags?.tourism || tags?.natural || tags?.man_made ||
           tags?.amenity || tags?.railway || tags?.landuse;
  return CATEGORY_LABELS[t] || '名無きもの';
}

function getCategory(tags, source) {
  if (source === 'wikipedia') return '伝承の地';
  if (source === 'wikidata') return '記録の地';
  if (source === 'gsi') return '地名の地';
  const t = tags?.historic || tags?.tourism || tags?.natural || tags?.man_made ||
           tags?.amenity || tags?.railway || tags?.landuse;
  return CATEGORY_LABELS[t] || '謎のもの';
}

function fmtDist(m) {
  return m < 1000 ? m + 'm' : (m/1000).toFixed(1) + 'km';
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = '⚠ ' + msg;
  el.style.display = 'block';
}
function hideError() { document.getElementById('error-msg').style.display = 'none'; }

function setBtn(state, text) {
  const btn = document.getElementById('go-btn');
  btn.className = state;
  btn.innerHTML = state === 'loading' ? `<span class="spinner"></span>${text}` : text;
  btn.disabled = state !== 'ready';
}

function updateDistBadge(lat, lon) {
  if (!spotLat) return;
  const d = haversine(lat, lon, spotLat, spotLon);
  const badge = document.getElementById('dist-badge');
  badge.classList.add('show');
  document.getElementById('dist-num').textContent = fmtDist(d);
  if (d < 50 && !arrived) {
    arrived = true;
    showReveal();
  }
}

function updateSelf(lat, lon) {
  userLat = lat; userLon = lon;
  if (!selfMarker) {
    selfMarker = L.marker([lat, lon], { icon: selfIcon, zIndexOffset: 1000 }).addTo(map);
  } else {
    selfMarker.setLatLng([lat, lon]);
  }
  updateDistBadge(lat, lon);
}

// ---- ルート ----
async function drawRoute(fromLat, fromLon, toLat, toLon) {
  const profile = OSRM_PROFILE[mode];
  const url = `${OSRM}/${profile}/${fromLon},${fromLat};${toLon},${toLat}?overview=full&geometries=geojson`;
  const res = await fetch(url);
  const data = await res.json();
  if (!data.routes || data.routes.length === 0) throw new Error('route');

  if (routeLayer) map.removeLayer(routeLayer);
  routeLayer = L.geoJSON(data.routes[0].geometry, {
    style: { color: '#d4af6a', weight: 3, opacity: 0.85, lineCap: 'round', lineJoin: 'round',
             dashArray: '1, 8' }
  }).addTo(map);
  // 影付き層
  const shadow = L.geoJSON(data.routes[0].geometry, {
    style: { color: '#5e3778', weight: 8, opacity: 0.3 }
  }).addTo(map);
  routeLayer.shadow = shadow;
  map.fitBounds(routeLayer.getBounds(), { padding: [80, 80] });
}

function clearRoute() {
  if (routeLayer) {
    if (routeLayer.shadow) map.removeLayer(routeLayer.shadow);
    map.removeLayer(routeLayer);
    routeLayer = null;
  }
}

// OSM Overpass
async function fetchOSM(lat, lon, r) {

(

  node["historic"](around:${r},${lat},${lon});

  node["man_made"="stele"](around:${r},${lat},${lon});
  node["man_made"="survey_point"](around:${r},${lat},${lon});
  // アート系
  node["tourism"="artwork"](around:${r},${lat},${lon});
  node["tourism"="viewpoint"](around:${r},${lat},${lon});
  // 自然
  node["natural"~"rock|cave_entrance|cliff|spring|volcano|geyser|sinkhole|peak|arch|stone"](around:${r},${lat},${lon});
  node["waterway"="waterfall"](around:${r},${lat},${lon});
  node["natural"="tree"]["denotation"~"natural_monument|landmark"](around:${r},${lat},${lon});
  node["natural"="tree"]["heritage"](around:${r},${lat},${lon});
  node["natural"="tree"]["name"](around:${r},${lat},${lon});
  node["natural"="water"]["name"](around:${r},${lat},${lon});
  // 産業遺産
  node["man_made"~"shrine|water_tower|chimney|gasometer|lighthouse|mine_shaft|adit|kiln|silo|storage_tank|windmill|watermill"](around:${r},${lat},${lon});
  // 廃線・廃墟
  node["railway"="abandoned"](around:${r},${lat},${lon});
  node["abandoned"](around:${r},${lat},${lon});
  node["disused"](around:${r},${lat},${lon});
  node["ruins"](around:${r},${lat},${lon});
  // 寺社・聖地
  node["amenity"="place_of_worship"](around:${r},${lat},${lon});
  // 古い生活施設
  node["amenity"="public_bath"](around:${r},${lat},${lon});
  node["amenity"="fountain"](around:${r},${lat},${lon});
  node["shop"="convenience"]["operator"](around:${r},${lat},${lon});
  node["shop"="confectionery"](around:${r},${lat},${lon});
  node["shop"="hardware"](around:${r},${lat},${lon});
  node["shop"="newsagent"](around:${r},${lat},${lon});
  node["shop"="tobacco"](around:${r},${lat},${lon});
  node["craft"](around:${r},${lat},${lon});
  // 墓地
  node["landuse"="cemetery"](around:${r},${lat},${lon});
  // 古地名・小地名
  node["place"~"locality|hamlet|isolated_dwelling|farm"](around:${r},${lat},${lon});
);
out center;`;

  for (const server of OVERPASS_SERVERS) {
    try {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 10000);
      const res = await fetch(server, {
        method: 'POST',
        body: 'data=' + encodeURIComponent(q),

      });
      clearTimeout(timer);
      const data = await res.json();

        .map(e => ({
          lat: e.lat || e.center?.lat,
          lon: e.lon || e.center?.lon,

          source: 'osm',
          id: 'osm-' + e.id,

}

// 除外判定（駅・公的機関・商業施設）
function isExcluded(s) {
  const t = s.tags || {};
  // 駅・交通
  if (t.railway === 'station' || t.railway === 'halt' || t.railway === 'tram_stop') return true;
  if (t.public_transport) return true;
  if (t.highway === 'bus_stop') return true;
  if (t.aeroway) return true;
  // 公的機関
  if (t.amenity === 'townhall' || t.amenity === 'courthouse') return true;
  if (t.amenity === 'police' || t.amenity === 'fire_station') return true;
  if (t.amenity === 'post_office' || t.amenity === 'post_box') return true;
  if (t.amenity === 'school' || t.amenity === 'university' || t.amenity === 'college' || t.amenity === 'kindergarten') return true;
  if (t.amenity === 'library') return true;
  if (t.amenity === 'hospital' || t.amenity === 'clinic' || t.amenity === 'dentist' || t.amenity === 'pharmacy' || t.amenity === 'doctors') return true;
  if (t.amenity === 'bank' || t.amenity === 'atm') return true;
  if (t.amenity === 'parking' || t.amenity === 'fuel' || t.amenity === 'charging_station') return true;
  if (t.office) return true;
  // チェーン店・商業色強いもの
  if (t.shop && (t.brand || t.operator?.match(/セブン|ローソン|ファミリーマート|ミニストップ|デイリーヤマザキ/))) {
    // チェーンのコンビニは除外、個人経営はOK
    if (t.shop === 'convenience') return true;
  }
  return false;
}

// Wikipedia/Wikidataの除外キーワード
function isExcludedByName(name, desc) {
  const text = (name || '') + ' ' + (desc || '');
  // 学校・公共機関・駅・商業施設
  if (/小学校|中学校|高等学校|大学|専門学校|高校$|学園|学院|幼稚園|保育園|保育所/.test(name || '')) return true;
  if (/駅$|停留所|バスターミナル|空港|港$|料金所|IC$|インターチェンジ|ジャンクション/.test(name || '')) return true;
  if (/役所|市役所|町役場|区役所|県庁|庁舎|警察署|消防署|郵便局|裁判所|刑務所|拘置所/.test(name || '')) return true;
  if (/図書館|公民館|体育館|文化センター|福祉センター|保健所/.test(name || '')) return true;
  if (/病院|医院|クリニック|診療所|歯科/.test(name || '')) return true;
  if (/銀行|信用金庫|JA$|農協/.test(name || '')) return true;
  if (/スーパー|ホームセンター|ショッピング|デパート|百貨店|アウトレット/.test(name || '')) return true;
  if (/ホテル|旅館|ビジネスホテル/.test(name || '')) return true;
  // 説明文ベース
  if (/^(小学校|中学校|高等学校|大学|駅|郵便局|警察署|消防署|病院|銀行)/.test(desc || '')) return true;
  return false;
}
async function fetchWikipedia(lat, lon, r) {
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 6000);
    const url = `https://ja.wikipedia.org/w/api.php?action=query&list=geosearch&gscoord=${lat}|${lon}&gsradius=${Math.min(r, 10000)}&gslimit=50&format=json&origin=*`;
    const res = await fetch(url, { signal: controller.signal });
    clearTimeout(timer);
    const data = await res.json();
    return (data.query?.geosearch || [])
      .filter(p => !isExcludedByName(p.title, ''))
      .map(p => ({
        lat: p.lat, lon: p.lon,
        tags: { name: p.title },
        source: 'wikipedia',
        name: p.title,
        pageid: p.pageid,
        id: 'wp-' + p.pageid,
      }));
  } catch (e) { return []; }
}

// Wikipedia 詳細
async function fetchWikipediaExtract(title) {
  try {
    const url = `https://ja.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`;
    const res = await fetch(url);
    const data = await res.json();
    return data.extract || '';
  } catch (e) { return ''; }
}

// Wikidata SPARQL（軽量版）
async function fetchWikidata(lat, lon, r) {
  const km = Math.min(r / 1000, 5);
  const sparql = `
SELECT ?item ?itemLabel ?coord ?desc WHERE {
  SERVICE wikibase:around {
    ?item wdt:P625 ?coord .
    bd:serviceParam wikibase:center "Point(${lon} ${lat})"^^geo:wktLiteral .
    bd:serviceParam wikibase:radius "${km}" .
  }
  OPTIONAL { ?item schema:description ?desc . FILTER(LANG(?desc) = "ja") }
  SERVICE wikibase:label { bd:serviceParam wikibase:language "ja,en". }
}
LIMIT 40`;
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 8000);
    const url = 'https://query.wikidata.org/sparql?format=json&query=' + encodeURIComponent(sparql);
    const res = await fetch(url, {
      headers: { 'Accept': 'application/sparql-results+json' },
      signal: controller.signal,
    });
    clearTimeout(timer);
    const data = await res.json();
    return (data.results?.bindings || []).map(b => {
      const m = b.coord.value.match(/Point\(([-\d.]+) ([-\d.]+)\)/);
      if (!m) return null;
      const name = b.itemLabel?.value;
      const desc = b.desc?.value || '';
      if (isExcludedByName(name, desc)) return null;
      const isEmotional = /民話|伝説|妖怪|文学|物語|霊|怪|塚|古墳|信仰|聖地|遺跡|心霊|怨/.test(desc);
      return {
        lat: parseFloat(m[2]), lon: parseFloat(m[1]),
        tags: { name },
        source: 'wikidata',
        name,
        desc,
        emotional: isEmotional,
        id: 'wd-' + b.item.value,
      };
    }).filter(Boolean);
  } catch (e) { return []; }
}

// しょぼいもの判定（本当にしょぼいもののみ）
function isShoboi(s) {
  const t = s.tags || {};
  if (t.amenity === 'vending_machine') return true;
  if (t.amenity === 'telephone') return true;
  if (t.amenity === 'toilets') return true;
  if (t.amenity === 'bench') return true;
  if (t.amenity === 'drinking_water') return true;
  if (t.highway === 'steps') return true;
  return false;
}

// 感動枠判定（拡張：見落としがちなものも含む）
function isEmotional(s) {
  if (s.emotional || s.narrative) return true;
  const t = s.tags || {};
  // 歴史
  if (t.historic === 'ruins') return true;
  if (t.historic === 'archaeological_site') return true;
  if (t.historic === 'tomb') return true;
  if (t.historic === 'castle') return true;
  if (t.historic === 'wayside_shrine') return true;
  if (t.historic === 'memorial') return true;
  if (t.historic === 'monument') return true;
  if (t.historic === 'well') return true;
  if (t.historic === 'boundary_stone') return true;
  if (t.historic === 'milestone') return true;
  if (t.historic === 'stone') return true;
  // 道端の小さなもの
  if (t.man_made === 'cross') return true;
  if (t.man_made === 'stele') return true;
  if (t.man_made === 'survey_point') return true;
  // 自然
  if (t.natural === 'cave_entrance') return true;
  if (t.natural === 'spring') return true;
  if (t.natural === 'cliff') return true;
  if (t.natural === 'volcano') return true;
  if (t.natural === 'geyser') return true;
  if (t.natural === 'sinkhole') return true;
  if (t.natural === 'tree' && (t.name || t.heritage || t.denotation)) return true;
  if (t.natural === 'rock' && t.name) return true;
  // アート・絶景
  if (t.tourism === 'viewpoint') return true;
  if (t.tourism === 'artwork') return true;
  // 産業遺産
  if (t.man_made === 'lighthouse') return true;
  if (t.man_made === 'mine_shaft' || t.man_made === 'adit') return true;
  if (t.man_made === 'kiln') return true;
  if (t.man_made === 'windmill' || t.man_made === 'watermill') return true;
  if (t.man_made === 'water_tower') return true;
  if (t.man_made === 'chimney') return true;
  if (t.man_made === 'gasometer') return true;
  // 廃線・廃墟
  if (t.railway === 'abandoned') return true;
  if (t.abandoned) return true;
  if (t.disused) return true;
  if (t.ruins) return true;
  // 生活感・古い商店
  if (t.amenity === 'public_bath') return true;
  if (t.shop === 'confectionery') return true; // 駄菓子屋
  if (t.shop === 'hardware') return true; // 金物屋
  if (t.shop === 'newsagent') return true;
  if (t.shop === 'tobacco') return true;
  if (t.craft) return true; // 職人系
  if (t.shop === 'convenience' && !t.brand) return true; // 個人経営コンビニ
  // 古地名
  if (t.place === 'locality' || t.place === 'hamlet' || t.place === 'isolated_dwelling') return true;
  // ソース
  if (s.source === 'wikipedia') return true;
  return false;
}

// 恐怖枠判定
function isHorror(s) {
  const t = s.tags || {};
  const name = (s.name || t.name || '').toString();
  const desc = (s.desc || '').toString();
  const text = name + ' ' + desc;
  // キーワード判定
  if (/血|鬼|呪|死|首|怨|霊|怪|妖|幽|地獄|墓|塚|供養|処刑|刑場|無縁/.test(text)) return true;
  // OSMタグ
  if (t.historic === 'tomb') return true;
  if (t.historic === 'ruins') return true;
  if (t.landuse === 'cemetery') return true;
  if (t.abandoned) return true;
  if (t.ruins) return true;
  if (t.railway === 'abandoned') return true;
  if (t.man_made === 'mine_shaft' || t.man_made === 'adit') return true;
  return false;
}

// モード別距離（恐怖モードは大幅拡張）
function getRadius() {
  if (horror) {
    return mode === 'foot' ? 5000 : mode === 'bike' ? 15000 : 30000;
  }
  return MODE_RADIUS[mode] || 1500;
}

// 全部取得＆統合
async function fetchAllSpots(lat, lon) {
  const r = getRadius();
  const [osm, wp, wd] = await Promise.all([
    fetchOSM(lat, lon, r),
    fetchWikipedia(lat, lon, r),
    fetchWikidata(lat, lon, r),
  ]);
  let all = [...osm, ...wp, ...wd];
  all = all
    .map(s => ({ ...s, distance: haversine(lat, lon, s.lat, s.lon) }))
    .filter(s => s.distance > 50)
    .filter(s => !badReports.includes(s.id))
    .filter(s => !recentPicks.includes(s.id)); // 連続防止

  if (horror) {
    // 恐怖モード：心霊系のみ
    all = all.filter(isHorror);
  } else if (emotion) {
    all = all.filter(isEmotional);
  } else if (mania) {
    all = all.filter(s => {
      if (s.source === 'wikipedia') return false;
      if (s.source === 'wikidata' && s.desc && !s.emotional) return false;
      if (s.source === 'osm') {
        if (s.tags?.tourism === 'attraction') return false;
        if (s.tags?.historic === 'castle' && s.tags?.name) return false;
      }
      return true;
    });
  } else {
    all = all.filter(s => !isShoboi(s) || Math.random() < 0.05);
  }

  return all;
}

// マイナー優先 & 感動優先 & 遠距離優先の重み付け選択
function weightedPick(spots) {
  // モード別の最小距離（これ以下は重み激減）
  const minDist = mode === 'foot' ? 100 : mode === 'bike' ? 1500 : 7000;
  const idealDist = mode === 'foot' ? 800 : mode === 'bike' ? 3000 : 12000;

  const weights = spots.map(s => {
    let w = 1.0;
    // 最小距離以下は強くペナルティ
    if (s.distance < minDist) w *= 0.05;
    // 理想距離に近いほど有利（ガウシアン的）
    const ratio = s.distance / idealDist;
    if (ratio < 1) w *= ratio; // 短すぎはダメ
    else w *= 1.0 / (1 + (ratio - 1) * 0.5); // 長すぎも少し減

    if (isHorror(s)) w *= horror ? 5 : 1;
    if (isEmotional(s)) w *= 4;
    if (isShoboi(s)) w *= 0.1;
    if (!s.tags?.name && !s.name) w *= 1.5;
    if (s.source === 'wikipedia') w *= 0.5;
    if (s.tags?.tourism === 'attraction') w *= 0.3;
    if (s.tags?.historic === 'castle' && s.tags?.name) w *= 0.4;
    if (s.narrative) w *= 5;
    return w;
  });
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < spots.length; i++) {
    r -= weights[i];
    if (r <= 0) return spots[i];
  }
  return spots[spots.length - 1];
}

// ---- 到着演出 ----
async function showReveal() {
  if (watchId) navigator.geolocation.clearWatch(watchId);

  const modal = document.getElementById('reveal-modal');
  document.getElementById('reveal-icon').textContent = getIcon(spotTags, spotSource);
  document.getElementById('reveal-name').textContent = getLabel(spotTags, spotName, spotSource);
  document.getElementById('reveal-cat').textContent = getCategory(spotTags, spotSource);

  // 説明文取得
  let desc = spotDesc || spotTags?.description || spotTags?.note || '';
  if (!desc && spotSource === 'wikipedia') {
    desc = await fetchWikipediaExtract(spotName);
  }
  if (desc) {
    document.getElementById('reveal-desc').textContent = desc.length > 200 ? desc.slice(0, 200) + '…' : desc;
  } else {
    document.getElementById('reveal-desc').textContent = '';
  }

  modal.classList.add('show');
}

// ---- メイン ----
async function go() {
  hideError();
  arrived = false;
  setBtn('loading', '現在地を取得中');
  document.getElementById('dist-badge').classList.remove('show');

  const loc = await new Promise((res, rej) => {
    if (!navigator.geolocation) { rej('位置情報未対応'); return; }
    navigator.geolocation.getCurrentPosition(
      p => res({ lat: p.coords.latitude, lon: p.coords.longitude }),
      () => rej('位置情報を取得できませんでした'),
      { enableHighAccuracy: true, timeout: 10000 }
    );
  }).catch(e => { showError(e); setBtn('ready', 'どこか連れてって'); return null; });
  if (!loc) return;

  updateSelf(loc.lat, loc.lon);
  map.setView([loc.lat, loc.lon], 15);

  setBtn('loading', '謎の地を探す');

  let elements;
  try {
    elements = await fetchAllSpots(loc.lat, loc.lon);
  } catch (e) {
    showError('データ取得に失敗しました');
    setBtn('ready', 'どこか連れてって');
    return;
  }

  if (elements.length === 0) {
    showError('この地には謎が見つからない');
    setBtn('ready', 'どこか連れてって');
    return;
  }

  spots = elements;
  const pick = weightedPick(spots);
  recentPicks.push(pick.id);
  if (recentPicks.length > 30) recentPicks.shift();
  localStorage.setItem('recentPicks', JSON.stringify(recentPicks));
  chosen = pick;
  spotLat = pick.lat; spotLon = pick.lon; spotTags = pick.tags;
  spotName = pick.name; spotDesc = pick.desc; spotSource = pick.source;

  if (destMarker) map.removeLayer(destMarker);
  destMarker = L.marker([spotLat, spotLon], { icon: destIcon }).addTo(map);

  // デバッグパネル表示
  const debugName = getLabel(spotTags, spotName, spotSource);
  const debugCat = getCategory(spotTags, spotSource);
  document.getElementById('debug-name').textContent = debugName;
  document.getElementById('debug-meta').textContent = `${debugCat} · ${spotSource}`;

  // Wikipediaリンク
  const wikiLink = document.getElementById('debug-wiki');
  if (spotSource === 'wikipedia' && spotName) {
    wikiLink.href = `https://ja.wikipedia.org/wiki/${encodeURIComponent(spotName)}`;
    wikiLink.textContent = 'Wikipedia ↗';
    wikiLink.style.display = 'inline-block';
  } else if (spotSource === 'wikidata' && chosen.id) {
    const wdId = chosen.id.replace('wd-http://www.wikidata.org/entity/', '');
    wikiLink.href = `https://www.wikidata.org/wiki/${wdId}`;
    wikiLink.textContent = 'Wikidata ↗';
    wikiLink.style.display = 'inline-block';
  } else {
    wikiLink.href = `https://ja.wikipedia.org/wiki/Special:Search?search=${encodeURIComponent(debugName)}`;
    wikiLink.textContent = 'Wiki検索 ↗';
    wikiLink.style.display = 'inline-block';
  }

  // Googleマップリンク
  document.getElementById('debug-gmap').href =
    `https://maps.google.com/?q=${spotLat},${spotLon}`;

  document.getElementById('debug-panel').style.display = 'block';

  setBtn('loading', '道筋を編む');
  try {
    await drawRoute(loc.lat, loc.lon, spotLat, spotLon);
  } catch (e) {
    const bounds = L.latLngBounds([loc.lat, loc.lon], [spotLat, spotLon]);
    map.fitBounds(bounds, { padding: [80, 80] });
  }

  updateDistBadge(loc.lat, loc.lon);
  setBtn('ready', '別の場所へ');

  if (watchId) navigator.geolocation.clearWatch(watchId);
  watchId = navigator.geolocation.watchPosition(
    p => {
      updateSelf(p.coords.latitude, p.coords.longitude);
      if (!map.getBounds().contains([p.coords.latitude, p.coords.longitude])) {
        map.panTo([p.coords.latitude, p.coords.longitude]);
      }
    },
    null,
    { enableHighAccuracy: true }
  );
}

function reset() {
  document.getElementById('reveal-modal').classList.remove('show');
  if (destMarker) { map.removeLayer(destMarker); destMarker = null; }
  clearRoute();
  document.getElementById('dist-badge').classList.remove('show');
  document.getElementById('debug-panel').style.display = 'none';
  arrived = false;
  setBtn('ready', 'どこか連れてって');
}

function reportBad() {
  if (chosen?.id) {
    badReports.push(chosen.id);
    localStorage.setItem('badReports', JSON.stringify(badReports));
  }
  reset();
}

// ---- イベント ----
document.getElementById('go-btn').addEventListener('click', () => {
  if (document.getElementById('go-btn').className === 'loading') return;
  go();
});

document.getElementById('reveal-again').addEventListener('click', reset);
document.getElementById('reveal-bad').addEventListener('click', reportBad);

document.querySelectorAll('.mode-btn[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn[data-mode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
  });
});

document.getElementById('mania-btn').addEventListener('click', () => {
  mania = !mania;
  if (mania) { emotion = false; horror = false; }
  updateModeBtns();
});

document.getElementById('emotion-btn').addEventListener('click', () => {
  emotion = !emotion;
  if (emotion) { mania = false; horror = false; }
  updateModeBtns();
});

document.getElementById('horror-btn').addEventListener('click', () => {
  horror = !horror;
  if (horror) { mania = false; emotion = false; }
  updateModeBtns();
});

function updateModeBtns() {
  document.getElementById('mania-btn').classList.toggle('active', mania);
  document.getElementById('emotion-btn').classList.toggle('active', emotion);
  document.getElementById('horror-btn').classList.toggle('active', horror);
}
</script>
</body>
</html>
